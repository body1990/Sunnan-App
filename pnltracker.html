<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="theme-color" content="#0A0A0D" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="محفظتي" />
<link rel="apple-touch-icon" id="appicon" />
<title>محفظتي</title>
<style>
  :root{--bg:#0A0A0D;--surface:#15151B;--surface2:#1F1F27;--border:#2A2A34;--text:#F1F1F4;--muted:#8A8A96;--orange:#FF7A1A;--orange2:#FFA04D;--green:#22D39A;--red:#FF4D6D}
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;margin:0;padding:0}
  body{background:var(--bg);color:var(--text);font-family:system-ui,-apple-system,'Segoe UI',Tahoma,sans-serif;min-height:100vh}
  .num{font-family:ui-monospace,'SF Mono','Roboto Mono',Menlo,monospace;font-variant-numeric:tabular-nums;direction:ltr;unicode-bidi:plaintext}
  ::-webkit-scrollbar{width:0;height:0}
  .wrap{max-width:480px;margin:0 auto;padding:18px 16px calc(104px + env(safe-area-inset-bottom))}
  .card{background:var(--surface);border:1px solid var(--border);border-radius:18px}
  input,textarea{background:var(--bg);border:1px solid var(--border);color:var(--text);border-radius:12px;padding:12px 14px;font-size:15px;outline:none;width:100%;font-family:inherit}
  input::placeholder,textarea::placeholder{color:var(--muted);opacity:.5}
  input[type=date]::-webkit-calendar-picker-indicator{filter:invert(.7)}
  .lab{display:flex;flex-direction:column;gap:6px;flex:1}
  .labt{color:var(--muted);font-size:12px}
  .ibtn{background:var(--surface2);border:1px solid var(--border);border-radius:10px;min-width:34px;height:34px;display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--text);font-size:12px;padding:0 8px}
  .primary{background:var(--orange);color:#1a0d00;border:none;border-radius:14px;padding:15px;font-size:16px;font-weight:800;cursor:pointer;width:100%}
  .row{display:flex;justify-content:space-between;align-items:center;background:var(--bg);border-radius:12px;padding:10px 12px}
  .empty{height:100%;min-height:120px;display:flex;align-items:center;justify-content:center;color:var(--muted);font-size:12px;text-align:center}
  .chip{flex:0 0 auto;padding:6px 14px;border-radius:99px;border:none;background:var(--surface2);color:var(--muted);font-size:12px;font-weight:700;cursor:pointer}
  .chip.on{background:var(--orange);color:#1a0d00}
  .fade{animation:fade .3s ease}@keyframes fade{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
  .sheet{animation:rise .25s cubic-bezier(.2,.8,.2,1)}@keyframes rise{from{transform:translateY(40px);opacity:.4}to{transform:none;opacity:1}}
  .spin{display:inline-block;animation:sp 1s linear infinite}@keyframes sp{to{transform:rotate(360deg)}}
  .overlay{position:fixed;inset:0;background:rgba(0,0,0,.66);z-index:50;display:flex;align-items:flex-end;justify-content:center}
  .sheetbox{background:var(--surface);border-top:1px solid var(--border);border-radius:24px 24px 0 0;width:100%;max-width:480px;max-height:92vh;overflow-y:auto;padding:20px}
  .grid7{display:grid;grid-template-columns:repeat(7,1fr);gap:4px}
  .day{aspect-ratio:1;border-radius:10px;border:1px solid var(--border);background:var(--bg);color:var(--text);cursor:pointer;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:1px;padding:2px;position:relative;font-size:12px}
  .nav{position:fixed;bottom:0;left:0;right:0;background:var(--surface);border-top:1px solid var(--border);z-index:35}
  .navin{max-width:480px;margin:0 auto;display:grid;grid-template-columns:repeat(6,1fr);padding:8px 2px calc(8px + env(safe-area-inset-bottom))}
  .navb{background:none;border:none;display:flex;flex-direction:column;align-items:center;gap:3px;padding:6px 0;cursor:pointer;color:var(--muted);font-size:9.5px;font-weight:500}
  .navb.on{color:var(--orange);font-weight:700}
  .fab{position:fixed;bottom:calc(82px + env(safe-area-inset-bottom));inset-inline-start:max(16px,calc(50% - 224px));width:56px;height:56px;border-radius:18px;border:none;background:linear-gradient(135deg,var(--orange),var(--orange2));display:flex;align-items:center;justify-content:center;box-shadow:0 8px 24px rgba(255,122,26,.4);cursor:pointer;z-index:40;color:#1a0d00;font-size:30px;line-height:1;transition:transform .2s}
  .fab.open{transform:rotate(45deg)}
  .menu{position:fixed;bottom:calc(150px + env(safe-area-inset-bottom));inset-inline-start:max(16px,calc(50% - 224px));display:flex;flex-direction:column;gap:8px;z-index:41}
  .menu button{display:flex;align-items:center;gap:8px;background:var(--surface);border:1px solid var(--border);color:var(--text);border-radius:12px;padding:10px 14px;font-size:13px;font-weight:600;cursor:pointer;box-shadow:0 6px 18px rgba(0,0,0,.4)}
  .menu .dot{color:var(--orange);font-weight:900}
  .pick{width:100%;border:1.5px dashed var(--border);background:var(--bg);border-radius:16px;padding:22px 16px;display:flex;flex-direction:column;align-items:center;gap:8px;cursor:pointer;color:var(--muted)}
  h2{font-size:18px;font-weight:700}
</style>
</head>
<body>
<div class="wrap fade" id="view"></div>
<div class="nav"><div class="navin" id="nav"></div></div>
<button class="fab" id="fab" onclick="toggleMenu()">+</button>
<div id="menu"></div>
<div id="modal"></div>
<input id="file" type="file" accept="image/*" style="display:none" onchange="onFile(event)" />
<input id="backupFile" type="file" accept=".json,application/json" style="display:none" onchange="onBackup(event)" />
<datalist id="coinDL"></datalist>
<script>
const C={orange:'#FF7A1A',green:'#22D39A',red:'#FF4D6D',border:'#2A2A34',muted:'#8A8A96'};
const RH_UP='#1FD16B',RH_DN='#FF5A5F';
const TR_GREEN='#8FCB3A';
const state={trades:[],accounts:[],balances:[],settings:{sym:'$'},tab:'home',tf:180,acct:'all',plan:{},cursor:{y:new Date().getFullYear(),m:new Date().getMonth()},menu:false};
let importState={};let editId=null;

function save(){try{localStorage.setItem('pt_state',JSON.stringify({trades:state.trades,accounts:state.accounts,balances:state.balances,settings:state.settings}))}catch(e){}}
function load(){try{const s=JSON.parse(localStorage.getItem('pt_state')||'{}');if(s.trades)state.trades=s.trades;if(s.accounts)state.accounts=s.accounts;if(s.balances)state.balances=s.balances;if(s.settings)Object.assign(state.settings,s.settings)}catch(e){}}

const sym=()=>state.settings.sym||'$';
const nf=(n,d=2)=>(Number.isFinite(+n)?+n:0).toLocaleString('en-US',{minimumFractionDigits:d,maximumFractionDigits:d});
const num=s=>{const v=parseFloat(String(s).replace(/,/g,'').replace(/[^0-9.\-]/g,''));return isNaN(v)?0:v};
const pad2=n=>String(n).padStart(2,'0');
const fmtD=d=>`${d.getFullYear()}-${pad2(d.getMonth()+1)}-${pad2(d.getDate())}`;
const todayStr=()=>fmtD(new Date());
const parseD=s=>{const[y,m,d]=String(s).split('-').map(Number);return new Date(y,(m||1)-1,d||1)};
const fmtNice=s=>{const d=parseD(s);return d.getDate()+' '+AR_MONTHS[d.getMonth()]};
const pc=v=>v>0?C.green:v<0?C.red:C.muted;
const sg=v=>`${v>=0?'+':'−'}${sym()}${nf(Math.abs(v))}`;
const esc=s=>String(s==null?'':s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
const val=id=>{const e=document.getElementById(id);return e?e.value:''};
const AR_MONTHS=['يناير','فبراير','مارس','أبريل','مايو','يونيو','يوليو','أغسطس','سبتمبر','أكتوبر','نوفمبر','ديسمبر'];
const AR_DOW=['إثنين','ثلاثاء','أربعاء','خميس','جمعة','سبت','أحد'];
const COINS=['BTC','ETH','SOL','BNB','XRP','DOGE','ADA','AVAX','LINK','TRX','TON','DOT','NEAR','SUI','HYPE','PEPE','WIF','FET','ENA','ONDO','JUP','TIA','INJ','SEI','ARB','OP','MEGA','KAS','TAO'];

function startOf(k){const d=new Date();d.setHours(0,0,0,0);if(k==='week')d.setDate(d.getDate()-((d.getDay()+6)%7));else if(k==='month')d.setDate(1);else if(k==='year')d.setMonth(0,1);return fmtD(d)}
function analytics(){
  const cap=+state.settings.capital||0;
  const src=state.acct==='all'?state.trades:state.trades.filter(x=>x.acc===state.acct);
  const t=[...src].map(x=>({...x,profit:(+x.proceeds||0)-(+x.cost||0)-(+x.fee||0)})).sort((a,b)=>(a.sellDate||'').localeCompare(b.sellDate||'')||a.id-b.id);
  let cum=0;const curve=[],dailyMap={};
  t.forEach(x=>{cum+=x.profit;curve.push({date:x.sellDate||x.buyDate||todayStr(),value:cap+cum});const d=x.sellDate||x.buyDate||todayStr();dailyMap[d]=(dailyMap[d]||0)+x.profit});
  const dailyArr=Object.keys(dailyMap).sort().map(d=>({date:d,pnl:dailyMap[d]}));
  const per=k=>{const s=startOf(k);return t.filter(x=>(x.sellDate||x.buyDate||'')>=s).reduce((a,b)=>a+b.profit,0)};
  const wins=t.filter(x=>x.profit>0).length;
  return {t,curve,dailyMap,dailyArr,capital:cap,total:cum,value:cap+cum,today:per('day'),week:per('week'),month:per('month'),year:per('year'),count:t.length,winRate:t.length?wins/t.length*100:0};
}

/* charts */
function smoothPath(pts){if(pts.length<2)return '';let d=`M ${pts[0].x} ${pts[0].y}`;for(let i=0;i<pts.length-1;i++){const p0=pts[i-1]||pts[i],p1=pts[i],p2=pts[i+1],p3=pts[i+2]||p2;const c1x=p1.x+(p2.x-p0.x)/6,c1y=p1.y+(p2.y-p0.y)/6,c2x=p2.x-(p3.x-p1.x)/6,c2y=p2.y-(p3.y-p1.y)/6;d+=` C ${c1x.toFixed(2)} ${c1y.toFixed(2)}, ${c2x.toFixed(2)} ${c2y.toFixed(2)}, ${p2.x} ${p2.y}`}return d}
function lineChartHTML(series,tfLabel){
  window._chartPts=null;
  if(series.length<2)return '<div class="empty">حدّث الرصيد بتاريخين مختلفين (مثلاً اليوم وأمس) ليظهر المنحنى</div>';
  const w=320,h=176,p=10,top=20,bot=24,vals=series.map(s=>s.value),min=Math.min(...vals),max=Math.max(...vals),rng=(max-min)||1;
  const X=i=>p+i*(w-2*p)/(series.length-1), Y=v=>top+(h-top-bot)*(1-(v-min)/rng);
  const pts=series.map((s,i)=>({x:+X(i).toFixed(2),y:+Y(s.value).toFixed(2),value:s.value,date:s.date}));
  const up=pts[pts.length-1].value>=pts[0].value,col=up?TR_GREEN:RH_DN,start=pts[0].value;
  window._chartPts={pts,w,h,col,start,tfLabel:tfLabel||''};
  const dPath=smoothPath(pts);
  const area=dPath+` L ${pts[pts.length-1].x} ${(h-bot).toFixed(1)} L ${pts[0].x} ${(h-bot).toFixed(1)} Z`;
  const maskSvg=`<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 ${w} ${h}' preserveAspectRatio='none'><path d='${area}' fill='white'/></svg>`;
  const maskUrl='data:image/svg+xml,'+encodeURIComponent(maskSvg);
  let maxI=0,minI=0;vals.forEach((v,i)=>{if(v>vals[maxI])maxI=i;if(v<vals[minI])minI=i});
  const baseY=Y(start).toFixed(1);
  return `<div id="chartWrap" style="position:relative;height:188px;touch-action:none;-webkit-user-select:none;user-select:none">
    <div style="position:absolute;inset:0;background-image:radial-gradient(${col} 0.9px,transparent 0.9px);background-size:7px 7px;opacity:.32;-webkit-mask:url('${maskUrl}') no-repeat;mask:url('${maskUrl}') no-repeat;-webkit-mask-size:100% 100%;mask-size:100% 100%"></div>
    <svg viewBox="0 0 ${w} ${h}" width="100%" height="188" preserveAspectRatio="none" style="display:block;position:relative">
      <line x1="0" y1="${baseY}" x2="${w}" y2="${baseY}" stroke="${C.border}" stroke-width="1" stroke-dasharray="2 4" vector-effect="non-scaling-stroke"/>
      <path d="${dPath}" fill="none" stroke="${col}" stroke-width="2.2" vector-effect="non-scaling-stroke" stroke-linejoin="round" stroke-linecap="round" style="filter:drop-shadow(0 0 3px ${col})"/>
      <line id="crossLine" x1="0" y1="0" x2="0" y2="${h}" stroke="${C.muted}" stroke-width="1" vector-effect="non-scaling-stroke" style="opacity:0"/>
    </svg>
    <div class="num" style="position:absolute;left:${(pts[maxI].x/w*100).toFixed(1)}%;top:0;transform:translateX(-50%);font-size:11px;color:var(--muted);white-space:nowrap">${sym()}${nf(max)}</div>
    <div class="num" style="position:absolute;left:${(pts[minI].x/w*100).toFixed(1)}%;bottom:1px;transform:translateX(-50%);font-size:11px;color:var(--muted);white-space:nowrap">${sym()}${nf(min)}</div>
    <div id="endDot" style="position:absolute;width:9px;height:9px;border-radius:99px;background:${col};transform:translate(-50%,-50%);box-shadow:0 0 9px ${col};pointer-events:none"></div>
    <div id="scrubDot" style="position:absolute;width:12px;height:12px;border-radius:99px;background:var(--bg);border:2.5px solid ${col};transform:translate(-50%,-50%);opacity:0;pointer-events:none;z-index:6"></div>
    <div id="chartTip" class="num" style="position:absolute;top:0;left:0;transform:translateX(-50%);background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:3px 8px;pointer-events:none;opacity:0;white-space:nowrap;z-index:7;font-size:10.5px;color:var(--text);transition:opacity .1s"></div>
  </div>`;
}
function bindChartCursor(){
  const wrap=document.getElementById('chartWrap');if(!wrap||!window._chartPts)return;
  const{pts,w,h,start,tfLabel}=window._chartPts;
  const line=document.getElementById('crossLine'),tip=document.getElementById('chartTip'),scrub=document.getElementById('scrubDot'),endDot=document.getElementById('endDot');
  const hv=document.getElementById('homeVal'),hd=document.getElementById('homeDelta');
  const dVT=hv?hv.textContent:'',dVC=hv?hv.style.color:'',dDT=hd?hd.innerHTML:'',dDC=hd?hd.style.color:'';
  const r0=wrap.getBoundingClientRect(),last=pts[pts.length-1];
  if(endDot){endDot.style.left=(last.x/w*r0.width)+'px';endDot.style.top=(last.y/h*r0.height)+'px'}
  const move=cx=>{
    const r=wrap.getBoundingClientRect();let f=(cx-r.left)/r.width;f=Math.max(0,Math.min(1,f));
    const q=pts[Math.round(f*(pts.length-1))],px=q.x/w*r.width,py=q.y/h*r.height;
    line.setAttribute('x1',q.x);line.setAttribute('x2',q.x);line.style.opacity='1';
    scrub.style.left=px+'px';scrub.style.top=py+'px';scrub.style.opacity='1';
    tip.textContent=fmtNice(q.date);tip.style.opacity='1';
    tip.style.left=Math.max(28,Math.min(r.width-28,px))+'px';tip.style.top=Math.max(0,py-30)+'px';
    if(hv){hv.textContent=sym()+nf(q.value)}
    if(hd){const ch=q.value-start,pct=Math.abs(start)>0.01?` (${ch>=0?'+':'−'}${nf(Math.abs(ch/start*100))}%)`:'';hd.textContent=`${ch>=0?'+':'−'}${sym()}${nf(Math.abs(ch))}${pct} · ${fmtNice(q.date)}`;hd.style.color=ch>0?TR_GREEN:ch<0?RH_DN:C.muted}
  };
  const reset=()=>{line.style.opacity='0';scrub.style.opacity='0';tip.style.opacity='0';if(hv){hv.textContent=dVT;hv.style.color=dVC}if(hd){hd.innerHTML=dDT;hd.style.color=dDC}};
  wrap.onpointerdown=e=>{try{wrap.setPointerCapture(e.pointerId)}catch(_){}move(e.clientX)};
  wrap.onpointermove=e=>{if(e.pointerType!=='mouse'||e.buttons)move(e.clientX)};
  wrap.onpointerup=reset;wrap.onpointercancel=reset;wrap.onpointerleave=reset;
}
function svgBars(items){
  if(!items.length)return '<div class="empty">لا توجد بيانات كافية بعد</div>';
  const w=320,h=150,p=6,n=items.length,maxAbs=Math.max(...items.map(d=>Math.abs(d.pnl)))||1,zero=p+(h-2*p)/2,bw=(w-2*p)/n;
  let bars='';items.forEach((d,i)=>{const x=p+i*bw+bw*.15,bwi=bw*.7,bh=Math.abs(d.pnl)/maxAbs*((h-2*p)/2),y=d.pnl>=0?zero-bh:zero;bars+=`<rect x="${x.toFixed(1)}" y="${y.toFixed(1)}" width="${bwi.toFixed(1)}" height="${Math.max(1,bh).toFixed(1)}" rx="1.5" fill="${d.pnl>=0?C.green:C.red}"/>`});
  return `<svg viewBox="0 0 ${w} ${h}" width="100%" height="150" preserveAspectRatio="none"><line x1="${p}" y1="${zero}" x2="${w-p}" y2="${zero}" stroke="${C.border}"/>${bars}</svg>`;
}

/* render */
function header(){return `<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:18px">
  <div style="display:flex;align-items:center;gap:9px"><div style="width:34px;height:34px;border-radius:10px;background:linear-gradient(135deg,var(--orange),var(--orange2));display:flex;align-items:center;justify-content:center;color:#1a0d00;font-weight:900">₿</div><span style="font-size:17px;font-weight:800">محفظتي</span></div>
  <button class="ibtn" style="background:rgba(255,122,26,.12);border-color:var(--orange);color:var(--orange);gap:6px" onclick="openTradeImg()">📷 استيراد صفقة</button></div>`}
function render(){
  load._done||(load(),load._done=true);
  document.getElementById('coinDL').innerHTML=COINS.map(c=>`<option value="${c}">`).join('');
  document.getElementById('view').innerHTML=header()+({home:viewHome,trd:viewTrades,plan:viewPlan,stats:viewStats,cal:viewCal,set:viewSet}[state.tab]());
  document.getElementById('nav').innerHTML=[['home','تحليل','📊'],['trd','صفقات','📋'],['plan','المخطِّط','🎯'],['stats','إحصاء','📈'],['cal','تقويم','🗓️'],['set','إعداد','⚙️']].map(([k,t,i])=>`<button class="navb ${state.tab===k?'on':''}" onclick="setTab('${k}')"><span style="font-size:19px">${i}</span>${t}</button>`).join('');
  if(state.tab==='plan')setTimeout(planCalc,0);
  document.getElementById('fab').className='fab'+(state.menu?' open':'');
  document.getElementById('menu').innerHTML=state.menu?`<div class="menu">
    <button onclick="closeMenu();openTradeImg()"><span class="dot">📷</span> استيراد صفقة (شراء + بيع)</button>
    <button onclick="closeMenu();openTrade()"><span class="dot">✍️</span> إضافة صفقة يدوياً</button>
    <button onclick="closeMenu();openBalance()"><span class="dot">⚖️</span> ضبط الرصيد (بداية/تصحيح)</button></div>`:'';
  if(state.tab==='home')bindChartCursor();
}
function viewHome(){
  const A=analytics();
  const B=balanceSeries(state.acct);
  const TF=[[1,'يوم'],[7,'أسبوع'],[30,'شهر'],[180,'٦ أشهر'],[365,'سنة']];
  const tfLabel=(TF.find(x=>x[0]===state.tf)||[,''])[1];
  const cut=new Date();cut.setDate(cut.getDate()-state.tf);const cutStr=fmtD(cut);
  const inR=d=>d>=cutStr;
  const series=B.curve.filter(x=>inR(x.date));
  const valBefore=d=>{let v=null;for(const p of B.curve){if(p.date<d)v=p.value;else break}return v};
  const pChange=k=>{const s=startOf(k);const b=valBefore(s);return B.current-(b==null?(B.curve[0]?B.curve[0].value:0):b)};
  const dailyBars=[];for(let i=1;i<B.curve.length;i++)dailyBars.push({date:B.curve[i].date,pnl:B.curve[i].value-B.curve[i-1].value});
  const bars=dailyBars.filter(x=>inR(x.date));
  const start=series.length?series[0].value:0, ch=B.current-start;
  const pct=Math.abs(start)>0.01?` (${ch>=0?'+':'−'}${nf(Math.abs(ch/start*100))}%)`:'';
  const deltaTxt=series.length>1?`${ch>=0?'+':'−'}${sym()}${nf(Math.abs(ch))}${pct} · ${tfLabel}`:'سجّل صفقاتك ليظهر النمو';
  const acctChips=state.accounts.length?`<div style="display:flex;gap:6px;overflow-x:auto;margin-bottom:4px">
     <button class="chip ${state.acct==='all'?'on':''}" onclick="setAcct('all')">الكل</button>
     ${state.accounts.map(a=>`<button class="chip ${state.acct===a.id?'on':''}" onclick="setAcct('${a.id}')">${esc(a.name)}</button>`).join('')}</div>`:'';
  const accLines=state.accounts.length>1&&state.acct==='all'?`<div style="display:flex;gap:8px;margin-top:10px;flex-wrap:wrap">${state.accounts.map(a=>`<div style="background:var(--bg);border-radius:10px;padding:6px 10px;font-size:11px;color:var(--muted)">${esc(a.name)} <span class="num" style="color:var(--text);font-weight:700">${sym()}${nf(B.byAcct[a.id]||0)}</span></div>`).join('')}</div>`:'';
  return `<div class="fade" style="display:flex;flex-direction:column;gap:14px">
    ${acctChips}
    <div class="card" style="padding:18px;background:radial-gradient(120% 90% at 80% 0%,rgba(143,203,58,.07),var(--surface))">

/* OCR helpers */
function loadTesseract(){return new Promise((res,rej)=>{if(window.Tesseract)return res();const s=document.createElement('script');s.src='https://cdnjs.cloudflare.com/ajax/libs/tesseract.js/5.1.0/tesseract.min.js';s.onload=()=>res();s.onerror=()=>rej(new Error('load'));document.head.appendChild(s)})}
function pickDate(text){const dt=text.match(/(\d{4}-\d{2}-\d{2})\s+\d{1,2}:\d{2}/);if(dt)return dt[1];const all=text.match(/\d{4}-\d{2}-\d{2}/g);if(all&&all.length)return all[all.length-1];return ''}
function parseOrder(text){
  const o={};
  const pair=text.match(/([A-Z]{2,6})\s*\/\s*[A-Z]{2,6}/i);if(pair)o.coin=pair[1].toUpperCase();
  o.side=/\bsell\b/i.test(text)?'sell':/\bbuy\b/i.test(text)?'buy':'';
  o.date=pickDate(text);
  const fv=text.match(/filled\s*value[^0-9]*([0-9][0-9,]*\.?[0-9]*)/i);if(fv)o.value=num(fv[1]);
  if(!o.value){const od=text.match(/filled\s*amount[^0-9]*([0-9][0-9,]*\.?[0-9]*)/i);if(od)o.value=num(od[1])}
  const fq=text.match(/filled\s*quantity[^0-9]*([0-9][0-9,]*\.?[0-9]*)/i);if(fq)o.qty=num(fq[1]);
  const ap=text.match(/avg\.?\s*filled\s*price[^0-9]*([0-9][0-9,]*\.?[0-9]*)/i);if(ap)o.price=num(ap[1]);
  return o;
}

/* ===== Stats / per-coin / risk calculator ===== */
function donut(winN,lossN,evenN){
  const tot=winN+lossN+evenN||1,r=42,cx=60,cy=60,circ=2*Math.PI*r;
  const seg=(n,col,off)=>{const len=n/tot*circ;return `<circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="${col}" stroke-width="14" stroke-dasharray="${len.toFixed(2)} ${(circ-len).toFixed(2)}" stroke-dashoffset="${(-off).toFixed(2)}" transform="rotate(-90 ${cx} ${cy})" stroke-linecap="butt"/>`};
  let off=0;const a=seg(winN,RH_UP,off);off+=winN/tot*circ;const b=seg(lossN,RH_DN,off);off+=lossN/tot*circ;const c=seg(evenN,C.muted,off);
  const wr=tot?Math.round(winN/tot*100):0;
  return `<svg viewBox="0 0 120 120" width="120" height="120"><circle cx="60" cy="60" r="42" fill="none" stroke="var(--surface2)" stroke-width="14"/>${a}${b}${c}<text x="60" y="56" text-anchor="middle" fill="var(--text)" font-size="22" font-weight="800" font-family="ui-monospace,monospace">${wr}%</text><text x="60" y="76" text-anchor="middle" fill="${C.muted}" font-size="11">فوز</text></svg>`;
}

  const t=A.t,wins=t.filter(x=>x.profit>0),losses=t.filter(x=>x.profit<0),even=t.filter(x=>x.profit===0);
  const gW=wins.reduce((a,b)=>a+b.profit,0),gL=Math.abs(losses.reduce((a,b)=>a+b.profit,0));
  const avgW=wins.length?gW/wins.length:0,avgL=losses.length?gL/losses.length:0;
  const pf=gL>0?gW/gL:(gW>0?Infinity:0);
  const best=Math.max(...t.map(x=>x.profit)),worst=Math.min(...t.map(x=>x.profit));
  const holds=t.filter(x=>x.buyDate&&x.sellDate).map(x=>(parseD(x.sellDate)-parseD(x.buyDate))/86400000).filter(d=>d>=0);
  const avgHold=holds.length?holds.reduce((a,b)=>a+b,0)/holds.length:0;
  const byCoin={};t.forEach(x=>{const c=x.coin||'—';(byCoin[c]=byCoin[c]||{coin:c,profit:0,n:0,w:0});byCoin[c].profit+=x.profit;byCoin[c].n++;if(x.profit>0)byCoin[c].w++});

  return `<div class="fade" style="display:flex;flex-direction:column;gap:14px">
    <div class="card" style="padding:16px;display:flex;align-items:center;gap:16px">
      ${donut(wins.length,losses.length,even.length)}

        <div style="display:flex;justify-content:space-between"><span style="color:var(--muted);font-size:12px">صفقات خاسرة</span><span class="num" style="color:${RH_DN};font-weight:700">${losses.length}</span></div>
        <div style="display:flex;justify-content:space-between"><span style="color:var(--muted);font-size:12px">عامل الربح</span><span class="num" style="color:${pf>=1?RH_UP:RH_DN};font-weight:700">${pf===Infinity?'∞':nf(pf,2)}</span></div>
      </div>
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px">
      ${M('متوسط الربح','+'+sym()+nf(avgW),RH_UP)}
      ${M('متوسط الخسارة','−'+sym()+nf(avgL),RH_DN)}
      ${M('أفضل صفقة','+'+sym()+nf(Math.abs(best)),RH_UP)}
      ${M('أسوأ صفقة','−'+sym()+nf(Math.abs(worst)),RH_DN)}

    </div>
    <div class="card" style="padding:14px"><span style="font-weight:700;font-size:14px">أداء كل عملة</span>
      <div style="display:flex;flex-direction:column;gap:10px;margin-top:12px">
        ${coins.map(c=>`<div>
          <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:4px">

      </div>

/* ===== accounts & balances ===== */
const accName=id=>{const a=state.accounts.find(x=>x.id===id);return a?a.name:'—'};
/* Per-account value over time: trades accumulate; manual balances are anchors (with backward projection before the first anchor). */
function acctCurve(acc){
  const trades=state.trades.filter(t=>(t.acc||'')===acc).map(t=>({date:t.sellDate||t.buyDate,p:(+t.proceeds||0)-(+t.cost||0)-(+t.fee||0)})).filter(t=>t.date);
  const anchors=state.balances.filter(b=>(b.acc||'')===acc).map(b=>({date:b.date,value:+b.value||0})).sort((a,b)=>a.date.localeCompare(b.date));
  const dates=[...new Set([...trades.map(t=>t.date),...anchors.map(a=>a.date)])].sort();
  if(!dates.length)return [];
  const sumP=(lo,hi)=>trades.reduce((s,t)=>s+((t.date>lo&&t.date<=hi)?t.p:0),0);
  const val=d=>{
    if(!anchors.length)return trades.reduce((s,t)=>s+(t.date<=d?t.p:0),0);
    let A=null;for(const a of anchors){if(a.date<=d)A=a;else break}
    if(A)return A.value+sumP(A.date,d);
    return anchors[0].value-sumP(d,anchors[0].date);
  };
  return dates.map(d=>({date:d,value:val(d)}));
}
function balanceSeries(filter){
  let accs;
  if(filter==='all'){accs=state.accounts.map(a=>a.id);if(state.trades.some(t=>!t.acc)||state.balances.some(b=>!b.acc))accs=[...accs,''];}
  else accs=[filter];
  const curves={},allDates=new Set();
  accs.forEach(a=>{const c=acctCurve(a);curves[a]=c;c.forEach(p=>allDates.add(p.date))});
  const dates=[...allDates].sort();
  const fwd=(c,d)=>{let v=0,f=false;for(const p of c){if(p.date<=d){v=p.value;f=true}else break}return f?v:0};
  const curve=dates.map(d=>({date:d,value:accs.reduce((s,a)=>s+fwd(curves[a],d),0)}));
  const byAcct={};state.accounts.forEach(a=>{const c=curves[a.id]!==undefined?curves[a.id]:acctCurve(a.id);byAcct[a.id]=c.length?c[c.length-1].value:0});
  const current=curve.length?curve[curve.length-1].value:0;
  return {curve,current,byAcct};
}

function planCalc(){

  state.plan={coin:v('pCoin'),entry:v('pEntry'),stop:v('pStop'),target:v('pTarget'),qty:v('pQty'),cap:v('pCap'),risk:v('pRisk'),rsi:v('pRsi'),smi:v('pSmi'),c24:v('p24'),c7:v('p7')};
  const out=g('planOut');if(!out)return;
  const entry=nv('pEntry'),stop=nv('pStop'),target=nv('pTarget'),cap=nv('pCap'),maxR=nv('pRisk')||1;
  if(!(entry>0)||!(stop>0)||entry===stop){out.innerHTML='<div class="card" style="padding:20px;text-align:center;color:var(--muted)">أدخل سعر الدخول ووقف الخسارة لحساب الخطورة.</div>';return}
  const isLong=stop<entry,lossFrac=Math.abs(entry-stop)/entry;
  let score=0;const R=[];const add=(pts,txt,bad)=>{score+=pts;R.push([txt,bad])};
  if(v('pRsi')!==''){const rsi=nv('pRsi');if(isLong){if(rsi>=75)add(25,'RSI '+rsi+' تشبّع شرائي',1);else if(rsi>=65)add(12,'RSI '+rsi+' مرتفع',1);else if(rsi<=30)add(-10,'RSI '+rsi+' تشبّع بيعي (فرصة)',0);else add(0,'RSI '+rsi+' متوازن',2);}else{if(rsi<=25)add(25,'RSI '+rsi+' تشبّع بيعي',1);else if(rsi>=70)add(-8,'RSI '+rsi+' مرتفع (فرصة بيع)',0);else add(0,'RSI '+rsi,2);}}
  if(v('pSmi')!==''){const smi=nv('pSmi');if(smi>=40)add(15,'SMI '+smi+' زخم مرتفع',1);else if(smi<=-40)add(-8,'SMI '+smi+' زخم منخفض (فرصة)',0);else add(0,'SMI '+smi+' متعادل',2)}
  if(v('p24')!==''){const c=nv('p24');if(c>=15)add(20,'+'+c+'% خلال 24س — مطاردة قمة',1);else if(c>=8)add(10,'+'+c+'% خلال 24س',1);else if(c<=-15)add(10,c+'% خلال 24س — هبوط حاد',1);else add(0,(c>=0?'+':'')+c+'% خلال 24س',2)}
  if(v('p7')!==''){const c=nv('p7');if(c>=40)add(15,'+'+c+'% خلال 7أيام — مبالغ',1);else if(c>=20)add(8,'+'+c+'% خلال 7أيام',1);else if(c<=-30)add(8,c+'% خلال 7أيام',1);else add(0,(c>=0?'+':'')+c+'% خلال 7أيام',2)}
  if(lossFrac<0.01)add(12,'وقف ضيّق جداً ('+nf(lossFrac*100)+'%) — قابل للضرب',1);
  else if(lossFrac>0.15)add(10,'وقف واسع ('+nf(lossFrac*100)+'%)',1);
  else add(0,'مسافة الوقف '+nf(lossFrac*100)+'%',0);
  let rr=null;if(target>0){const reward=Math.abs(target-entry),rk=Math.abs(entry-stop);rr=rk>0?reward/rk:0;if((isLong&&target<=entry)||(!isLong&&target>=entry))add(15,'الهدف بالاتجاه الخطأ',1);else if(rr<1)add(20,'R:R '+nf(rr,2)+' ضعيف',1);else if(rr<1.5)add(8,'R:R '+nf(rr,2)+' مقبول',2);else add(-10,'R:R '+nf(rr,2)+' جيد',0)}
  score=Math.max(0,Math.min(100,Math.round(score)));
  const effR=Math.max(0.1,maxR*(1-score/100*0.7));
  const riskAmt=cap*effR/100;let size=lossFrac>0?riskAmt/lossFrac:0;if(size>cap)size=cap;
  const qty=entry>0?size/entry:0,potLoss=size*lossFrac,potGain=target>0?qty*Math.abs(target-entry):0;
  const lvl=score<25?['منخفضة',RH_UP]:score<50?['متوسطة','#E0B341']:score<75?['مرتفعة','#FF8A3D']:['مرتفعة جداً',RH_DN];
  const pctCap=cap>0?size/cap*100:0;
  const cell=(l,val,col)=>`<div class="card" style="padding:12px;display:flex;flex-direction:column;gap:3px;background:var(--bg)"><span style="color:var(--muted);font-size:11px">${l}</span><span class="num" style="font-weight:800;font-size:15px;color:${col||'var(--text)'}">${val}</span></div>`;
  out.innerHTML=`<div style="display:flex;flex-direction:column;gap:14px">
    <div class="card" style="padding:16px">
      <div style="display:flex;justify-content:space-between;align-items:baseline"><span style="color:var(--muted);font-size:13px">درجة خطورة الصفقة</span><span class="num" style="font-weight:800;color:${lvl[1]}">${lvl[0]} · ${score}/100</span></div>
      <div style="height:12px;border-radius:99px;margin-top:10px;background:linear-gradient(90deg,#1FD16B,#E0B341,#FF5A5F);position:relative">
        <div style="position:absolute;top:-3px;${'left'}:calc(${score}% - 3px);width:6px;height:18px;border-radius:3px;background:#fff;box-shadow:0 0 6px rgba(0,0,0,.6)"></div></div>
    </div>
    <div class="card" style="padding:18px;background:radial-gradient(120% 90% at 80% 0%,rgba(31,209,107,.10),var(--surface))">
      <span style="color:var(--muted);font-size:13px">المبلغ المقترح للدخول (${isLong?'شراء':'بيع'})</span>
      <div class="num" style="font-size:34px;font-weight:800;color:var(--text);margin-top:2px">${sym()}${nf(size)}</div>
      <div class="num" style="color:var(--muted);font-size:13px;margin-top:2px">${nf(pctCap)}% من رأس مالك · كمية ≈ ${nf(qty,6)}</div>
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px">
      ${cell('المبلغ المخاطَر به','−'+sym()+nf(potLoss),RH_DN)}
      ${cell('لو ضرب الهدف',target>0?'+'+sym()+nf(potGain):'—',target>0?RH_UP:'var(--muted)')}
      ${cell('نسبة المخاطرة الفعلية',nf(effR)+'%')}
      ${cell('نسبة المخاطرة/العائد',rr!=null?nf(rr,2)+' : 1':'—',rr!=null?(rr>=1.5?RH_UP:rr>=1?'#E0B341':RH_DN):'var(--muted)')}
    </div>
    <div class="card" style="padding:14px">
      <span style="font-weight:700;font-size:13px">الإشارات</span>
      <div style="display:flex;flex-direction:column;gap:7px;margin-top:10px">
        ${R.map(([t,b])=>`<div style="display:flex;align-items:center;gap:8px;font-size:12.5px"><span style="width:8px;height:8px;border-radius:99px;flex:0 0 auto;background:${b===1?RH_DN:b===0?RH_UP:C.muted}"></span><span style="color:${b===2?'var(--muted)':'var(--text)'}">${t}</span></div>`).join('')}
      </div>
    </div>
    <div class="card" style="padding:13px;background:rgba(255,122,26,.06);border:1px solid rgba(255,122,26,.2)">
      <span style="font-size:12px;color:var(--muted);line-height:1.6">💡 كلما زادت الخطورة، قلّ المبلغ المقترح تلقائياً (لتحمي رأس مالك). هذا اجتهاد حسابي مش نصيحة استثمارية — القرار قرارك.</span>
    </div>
  </div>`;
}

function boot(){load();load._done=true;setAppIcon();if(state.settings.pin)showLock();else render()}
boot();
</script>
</body>
