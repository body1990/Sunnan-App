<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="theme-color" content="#0A0A0D" />
<title>محفظتي</title>
<style>
  :root{--bg:#0A0A0D;--surface:#15151B;--surface2:#1F1F27;--border:#2A2A34;--text:#F1F1F4;--muted:#8A8A96;--orange:#FF7A1A;--orange2:#FFA04D;--green:#22D39A;--red:#FF4D6D}
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;margin:0;padding:0}
  body{background:var(--bg);color:var(--text);font-family:system-ui,-apple-system,'Segoe UI',Tahoma,sans-serif;min-height:100vh}
  .num{font-family:ui-monospace,'SF Mono','Roboto Mono',Menlo,monospace;font-variant-numeric:tabular-nums;direction:ltr;unicode-bidi:plaintext}
  ::-webkit-scrollbar{width:0;height:0}
  .wrap{max-width:480px;margin:0 auto;padding:18px 16px calc(104px + env(safe-area-inset-bottom))}
  .card{background:var(--surface);border:1px solid var(--border);border-radius:18px}
  input,textarea{background:var(--bg);border:1px solid var(--border);color:var(--text);border-radius:12px;padding:12px 14px;font-size:15px;outline:none;width:100%;font-family:inherit}
  input::placeholder,textarea::placeholder{color:var(--muted);opacity:.5}
  input[type=date]::-webkit-calendar-picker-indicator{filter:invert(.7)}
  .lab{display:flex;flex-direction:column;gap:6px;flex:1}
  .labt{color:var(--muted);font-size:12px}
  .ibtn{background:var(--surface2);border:1px solid var(--border);border-radius:10px;min-width:34px;height:34px;display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--text);font-size:12px;padding:0 8px}
  .primary{background:var(--orange);color:#1a0d00;border:none;border-radius:14px;padding:15px;font-size:16px;font-weight:800;cursor:pointer;width:100%}
  .row{display:flex;justify-content:space-between;align-items:center;background:var(--bg);border-radius:12px;padding:10px 12px}
  .empty{height:100%;min-height:120px;display:flex;align-items:center;justify-content:center;color:var(--muted);font-size:12px;text-align:center}
  .chip{flex:0 0 auto;padding:6px 14px;border-radius:99px;border:none;background:var(--surface2);color:var(--muted);font-size:12px;font-weight:700;cursor:pointer}
  .chip.on{background:var(--orange);color:#1a0d00}
  .fade{animation:fade .3s ease}@keyframes fade{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
  .sheet{animation:rise .25s cubic-bezier(.2,.8,.2,1)}@keyframes rise{from{transform:translateY(40px);opacity:.4}to{transform:none;opacity:1}}
  .spin{display:inline-block;animation:sp 1s linear infinite}@keyframes sp{to{transform:rotate(360deg)}}
  .overlay{position:fixed;inset:0;background:rgba(0,0,0,.66);z-index:50;display:flex;align-items:flex-end;justify-content:center}
  .sheetbox{background:var(--surface);border-top:1px solid var(--border);border-radius:24px 24px 0 0;width:100%;max-width:480px;max-height:92vh;overflow-y:auto;padding:20px}
  .grid7{display:grid;grid-template-columns:repeat(7,1fr);gap:4px}
  .day{aspect-ratio:1;border-radius:10px;border:1px solid var(--border);background:var(--bg);color:var(--text);cursor:pointer;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:1px;padding:2px;position:relative;font-size:12px}
  .nav{position:fixed;bottom:0;left:0;right:0;background:var(--surface);border-top:1px solid var(--border);z-index:35}
  .navin{max-width:480px;margin:0 auto;display:grid;grid-template-columns:repeat(4,1fr);padding:8px 8px calc(8px + env(safe-area-inset-bottom))}
  .navb{background:none;border:none;display:flex;flex-direction:column;align-items:center;gap:4px;padding:6px 0;cursor:pointer;color:var(--muted);font-size:10.5px;font-weight:500}
  .navb.on{color:var(--orange);font-weight:700}
  .fab{position:fixed;bottom:calc(82px + env(safe-area-inset-bottom));inset-inline-start:max(16px,calc(50% - 224px));width:56px;height:56px;border-radius:18px;border:none;background:linear-gradient(135deg,var(--orange),var(--orange2));display:flex;align-items:center;justify-content:center;box-shadow:0 8px 24px rgba(255,122,26,.4);cursor:pointer;z-index:40;color:#1a0d00;font-size:30px;line-height:1;transition:transform .2s}
  .fab.open{transform:rotate(45deg)}
  .menu{position:fixed;bottom:calc(150px + env(safe-area-inset-bottom));inset-inline-start:max(16px,calc(50% - 224px));display:flex;flex-direction:column;gap:8px;z-index:41}
  .menu button{display:flex;align-items:center;gap:8px;background:var(--surface);border:1px solid var(--border);color:var(--text);border-radius:12px;padding:10px 14px;font-size:13px;font-weight:600;cursor:pointer;box-shadow:0 6px 18px rgba(0,0,0,.4)}
  .menu .dot{color:var(--orange);font-weight:900}
  .pick{width:100%;border:1.5px dashed var(--border);background:var(--bg);border-radius:16px;padding:22px 16px;display:flex;flex-direction:column;align-items:center;gap:8px;cursor:pointer;color:var(--muted)}
  h2{font-size:18px;font-weight:700}
</style>
</head>
<body>
<div class="wrap fade" id="view"></div>
<div class="nav"><div class="navin" id="nav"></div></div>
<button class="fab" id="fab" onclick="toggleMenu()">+</button>
<div id="menu"></div>
<div id="modal"></div>
<input id="file" type="file" accept="image/*" style="display:none" onchange="onFile(event)" />
<datalist id="coinDL"></datalist>
<script>
const C={orange:'#FF7A1A',green:'#22D39A',red:'#FF4D6D',border:'#2A2A34',muted:'#8A8A96'};
const RH_UP='#1FD16B',RH_DN='#FF5A5F';
const TR_GREEN='#8FCB3A';
const state={trades:[],settings:{sym:'$'},tab:'home',tf:180,cursor:{y:new Date().getFullYear(),m:new Date().getMonth()},menu:false};
let importState={};let editId=null;

function save(){try{localStorage.setItem('pt_state',JSON.stringify({trades:state.trades,settings:state.settings}))}catch(e){}}
function load(){try{const s=JSON.parse(localStorage.getItem('pt_state')||'{}');if(s.trades)state.trades=s.trades;if(s.settings)Object.assign(state.settings,s.settings)}catch(e){}}

const sym=()=>state.settings.sym||'$';
const nf=(n,d=2)=>(Number.isFinite(+n)?+n:0).toLocaleString('en-US',{minimumFractionDigits:d,maximumFractionDigits:d});
const num=s=>{const v=parseFloat(String(s).replace(/,/g,'').replace(/[^0-9.\-]/g,''));return isNaN(v)?0:v};
const pad2=n=>String(n).padStart(2,'0');
const fmtD=d=>`${d.getFullYear()}-${pad2(d.getMonth()+1)}-${pad2(d.getDate())}`;
const todayStr=()=>fmtD(new Date());
const parseD=s=>{const[y,m,d]=String(s).split('-').map(Number);return new Date(y,(m||1)-1,d||1)};
const fmtNice=s=>{const d=parseD(s);return d.getDate()+' '+AR_MONTHS[d.getMonth()]};
const pc=v=>v>0?C.green:v<0?C.red:C.muted;
const sg=v=>`${v>=0?'+':'−'}${sym()}${nf(Math.abs(v))}`;
const esc=s=>String(s==null?'':s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
const val=id=>{const e=document.getElementById(id);return e?e.value:''};
const AR_MONTHS=['يناير','فبراير','مارس','أبريل','مايو','يونيو','يوليو','أغسطس','سبتمبر','أكتوبر','نوفمبر','ديسمبر'];
const AR_DOW=['إثنين','ثلاثاء','أربعاء','خميس','جمعة','سبت','أحد'];
const COINS=['BTC','ETH','SOL','BNB','XRP','DOGE','ADA','AVAX','LINK','TRX','TON','DOT','NEAR','SUI','HYPE','PEPE','WIF','FET','ENA','ONDO','JUP','TIA','INJ','SEI','ARB','OP','MEGA','KAS','TAO'];

function startOf(k){const d=new Date();d.setHours(0,0,0,0);if(k==='week')d.setDate(d.getDate()-((d.getDay()+6)%7));else if(k==='month')d.setDate(1);else if(k==='year')d.setMonth(0,1);return fmtD(d)}
function analytics(){
  const cap=+state.settings.capital||0;
  const t=[...state.trades].map(x=>({...x,profit:(+x.proceeds||0)-(+x.cost||0)-(+x.fee||0)})).sort((a,b)=>(a.sellDate||'').localeCompare(b.sellDate||'')||a.id-b.id);
  let cum=0;const curve=[],dailyMap={};
  t.forEach(x=>{cum+=x.profit;curve.push({date:x.sellDate||x.buyDate||todayStr(),value:cap+cum});const d=x.sellDate||x.buyDate||todayStr();dailyMap[d]=(dailyMap[d]||0)+x.profit});
  const dailyArr=Object.keys(dailyMap).sort().map(d=>({date:d,pnl:dailyMap[d]}));
  const per=k=>{const s=startOf(k);return t.filter(x=>(x.sellDate||x.buyDate||'')>=s).reduce((a,b)=>a+b.profit,0)};
  const wins=t.filter(x=>x.profit>0).length;
  return {t,curve,dailyMap,dailyArr,capital:cap,total:cum,value:cap+cum,today:per('day'),week:per('week'),month:per('month'),year:per('year'),count:t.length,winRate:t.length?wins/t.length*100:0};
}

/* charts */
function smoothPath(pts){if(pts.length<2)return '';let d=`M ${pts[0].x} ${pts[0].y}`;for(let i=0;i<pts.length-1;i++){const p0=pts[i-1]||pts[i],p1=pts[i],p2=pts[i+1],p3=pts[i+2]||p2;const c1x=p1.x+(p2.x-p0.x)/6,c1y=p1.y+(p2.y-p0.y)/6,c2x=p2.x-(p3.x-p1.x)/6,c2y=p2.y-(p3.y-p1.y)/6;d+=` C ${c1x.toFixed(2)} ${c1y.toFixed(2)}, ${c2x.toFixed(2)} ${c2y.toFixed(2)}, ${p2.x} ${p2.y}`}return d}
function lineChartHTML(series,tfLabel){
  window._chartPts=null;
  if(series.length<2)return '<div class="empty">سجّل صفقتين على الأقل ليظهر المنحنى</div>';
  const w=320,h=176,p=10,top=20,bot=24,vals=series.map(s=>s.value),min=Math.min(...vals),max=Math.max(...vals),rng=(max-min)||1;
  const X=i=>p+i*(w-2*p)/(series.length-1), Y=v=>top+(h-top-bot)*(1-(v-min)/rng);
  const pts=series.map((s,i)=>({x:+X(i).toFixed(2),y:+Y(s.value).toFixed(2),value:s.value,date:s.date}));
  const up=pts[pts.length-1].value>=pts[0].value,col=up?TR_GREEN:RH_DN,start=pts[0].value;
  window._chartPts={pts,w,h,col,start,tfLabel:tfLabel||''};
  const dPath=smoothPath(pts);
  const area=dPath+` L ${pts[pts.length-1].x} ${(h-bot).toFixed(1)} L ${pts[0].x} ${(h-bot).toFixed(1)} Z`;
  const maskSvg=`<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 ${w} ${h}' preserveAspectRatio='none'><path d='${area}' fill='white'/></svg>`;
  const maskUrl='data:image/svg+xml,'+encodeURIComponent(maskSvg);
  let maxI=0,minI=0;vals.forEach((v,i)=>{if(v>vals[maxI])maxI=i;if(v<vals[minI])minI=i});
  const baseY=Y(start).toFixed(1);
  return `<div id="chartWrap" style="position:relative;height:188px;touch-action:none;-webkit-user-select:none;user-select:none">
    <div style="position:absolute;inset:0;background-image:radial-gradient(${col} 0.9px,transparent 0.9px);background-size:7px 7px;opacity:.32;-webkit-mask:url('${maskUrl}') no-repeat;mask:url('${maskUrl}') no-repeat;-webkit-mask-size:100% 100%;mask-size:100% 100%"></div>
    <svg viewBox="0 0 ${w} ${h}" width="100%" height="188" preserveAspectRatio="none" style="display:block;position:relative">
      <line x1="0" y1="${baseY}" x2="${w}" y2="${baseY}" stroke="${C.border}" stroke-width="1" stroke-dasharray="2 4" vector-effect="non-scaling-stroke"/>
      <path d="${dPath}" fill="none" stroke="${col}" stroke-width="2.2" vector-effect="non-scaling-stroke" stroke-linejoin="round" stroke-linecap="round" style="filter:drop-shadow(0 0 3px ${col})"/>
      <line id="crossLine" x1="0" y1="0" x2="0" y2="${h}" stroke="${C.muted}" stroke-width="1" vector-effect="non-scaling-stroke" style="opacity:0"/>
    </svg>
    <div class="num" style="position:absolute;left:${(pts[maxI].x/w*100).toFixed(1)}%;top:0;transform:translateX(-50%);font-size:11px;color:var(--muted);white-space:nowrap">${sym()}${nf(max)}</div>
    <div class="num" style="position:absolute;left:${(pts[minI].x/w*100).toFixed(1)}%;bottom:1px;transform:translateX(-50%);font-size:11px;color:var(--muted);white-space:nowrap">${sym()}${nf(min)}</div>
    <div id="endDot" style="position:absolute;width:9px;height:9px;border-radius:99px;background:${col};transform:translate(-50%,-50%);box-shadow:0 0 9px ${col};pointer-events:none"></div>
    <div id="scrubDot" style="position:absolute;width:12px;height:12px;border-radius:99px;background:var(--bg);border:2.5px solid ${col};transform:translate(-50%,-50%);opacity:0;pointer-events:none;z-index:6"></div>
    <div id="chartTip" class="num" style="position:absolute;top:0;left:0;transform:translateX(-50%);background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:3px 8px;pointer-events:none;opacity:0;white-space:nowrap;z-index:7;font-size:10.5px;color:var(--text);transition:opacity .1s"></div>
  </div>`;
}
function bindChartCursor(){
  const wrap=document.getElementById('chartWrap');if(!wrap||!window._chartPts)return;
  const{pts,w,h,start,tfLabel}=window._chartPts;
  const line=document.getElementById('crossLine'),tip=document.getElementById('chartTip'),scrub=document.getElementById('scrubDot'),endDot=document.getElementById('endDot');
  const hv=document.getElementById('homeVal'),hd=document.getElementById('homeDelta');
  const dVT=hv?hv.textContent:'',dVC=hv?hv.style.color:'',dDT=hd?hd.innerHTML:'',dDC=hd?hd.style.color:'';
  const r0=wrap.getBoundingClientRect(),last=pts[pts.length-1];
  if(endDot){endDot.style.left=(last.x/w*r0.width)+'px';endDot.style.top=(last.y/h*r0.height)+'px'}
  const move=cx=>{
    const r=wrap.getBoundingClientRect();let f=(cx-r.left)/r.width;f=Math.max(0,Math.min(1,f));
    const q=pts[Math.round(f*(pts.length-1))],px=q.x/w*r.width,py=q.y/h*r.height;
    line.setAttribute('x1',q.x);line.setAttribute('x2',q.x);line.style.opacity='1';
    scrub.style.left=px+'px';scrub.style.top=py+'px';scrub.style.opacity='1';
    tip.textContent=fmtNice(q.date);tip.style.opacity='1';
    tip.style.left=Math.max(28,Math.min(r.width-28,px))+'px';tip.style.top=Math.max(0,py-30)+'px';
    if(hv){hv.textContent=sym()+nf(q.value)}
    if(hd){const ch=q.value-start,pct=Math.abs(start)>0.01?` (${ch>=0?'+':'−'}${nf(Math.abs(ch/start*100))}%)`:'';hd.textContent=`${ch>=0?'+':'−'}${sym()}${nf(Math.abs(ch))}${pct} · ${fmtNice(q.date)}`;hd.style.color=ch>0?TR_GREEN:ch<0?RH_DN:C.muted}
  };
  const reset=()=>{line.style.opacity='0';scrub.style.opacity='0';tip.style.opacity='0';if(hv){hv.textContent=dVT;hv.style.color=dVC}if(hd){hd.innerHTML=dDT;hd.style.color=dDC}};
  wrap.onpointerdown=e=>{try{wrap.setPointerCapture(e.pointerId)}catch(_){}move(e.clientX)};
  wrap.onpointermove=e=>{if(e.pointerType!=='mouse'||e.buttons)move(e.clientX)};
  wrap.onpointerup=reset;wrap.onpointercancel=reset;wrap.onpointerleave=reset;
}
function svgBars(items){
  if(!items.length)return '<div class="empty">لا توجد بيانات كافية بعد</div>';
  const w=320,h=150,p=6,n=items.length,maxAbs=Math.max(...items.map(d=>Math.abs(d.pnl)))||1,zero=p+(h-2*p)/2,bw=(w-2*p)/n;
  let bars='';items.forEach((d,i)=>{const x=p+i*bw+bw*.15,bwi=bw*.7,bh=Math.abs(d.pnl)/maxAbs*((h-2*p)/2),y=d.pnl>=0?zero-bh:zero;bars+=`<rect x="${x.toFixed(1)}" y="${y.toFixed(1)}" width="${bwi.toFixed(1)}" height="${Math.max(1,bh).toFixed(1)}" rx="1.5" fill="${d.pnl>=0?C.green:C.red}"/>`});
  return `<svg viewBox="0 0 ${w} ${h}" width="100%" height="150" preserveAspectRatio="none"><line x1="${p}" y1="${zero}" x2="${w-p}" y2="${zero}" stroke="${C.border}"/>${bars}</svg>`;
}

/* render */
function header(){return `<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:18px">
  <div style="display:flex;align-items:center;gap:9px"><div style="width:34px;height:34px;border-radius:10px;background:linear-gradient(135deg,var(--orange),var(--orange2));display:flex;align-items:center;justify-content:center;color:#1a0d00;font-weight:900">₿</div><span style="font-size:17px;font-weight:800">محفظتي</span></div>
  <button class="ibtn" style="background:rgba(255,122,26,.12);border-color:var(--orange);color:var(--orange);gap:6px" onclick="openTradeImg()">📷 استيراد صفقة</button></div>`}
function render(){
  load._done||(load(),load._done=true);
  document.getElementById('coinDL').innerHTML=COINS.map(c=>`<option value="${c}">`).join('');
  document.getElementById('view').innerHTML=header()+({home:viewHome,cal:viewCal,trd:viewTrades,set:viewSet}[state.tab]());
  document.getElementById('nav').innerHTML=[['home','التحليل','📊'],['cal','التقويم','🗓️'],['trd','الصفقات','📋'],['set','إعدادات','⚙️']].map(([k,t,i])=>`<button class="navb ${state.tab===k?'on':''}" onclick="setTab('${k}')"><span style="font-size:20px">${i}</span>${t}</button>`).join('');
  document.getElementById('fab').className='fab'+(state.menu?' open':'');
  document.getElementById('menu').innerHTML=state.menu?`<div class="menu">
    <button onclick="closeMenu();openTradeImg()"><span class="dot">📷</span> استيراد صفقة (شراء + بيع)</button>
    <button onclick="closeMenu();openTrade()"><span class="dot">✍️</span> إضافة صفقة يدوياً</button></div>`:'';
  if(state.tab==='home')bindChartCursor();
}
function viewHome(){
  const A=analytics();
  const TF=[[1,'يوم'],[7,'أسبوع'],[30,'شهر'],[180,'٦ أشهر'],[365,'سنة']];
  const tfLabel=(TF.find(x=>x[0]===state.tf)||[,''])[1];
  const cut=new Date();cut.setDate(cut.getDate()-state.tf);const cutStr=fmtD(cut);
  const inR=d=>d>=cutStr;
  const series=A.curve.filter(x=>inR(x.date));
  const bars=A.dailyArr.filter(x=>inR(x.date));
  const start=series.length?series[0].value:A.capital, ch=A.value-start;
  const pct=Math.abs(start)>0.01?` (${ch>=0?'+':'−'}${nf(Math.abs(ch/start*100))}%)`:'';
  const deltaTxt=`${ch>=0?'+':'−'}${sym()}${nf(Math.abs(ch))}${pct} · ${tfLabel}`;
  const capBtn=A.capital?`<button onclick="openCapital()" style="background:none;border:none;color:var(--muted);font-size:12px;cursor:pointer;padding:0 4px">✎</button>`:`<button onclick="openCapital()" style="background:rgba(255,122,26,.14);border:1px solid var(--orange);color:var(--orange);font-size:11px;cursor:pointer;padding:3px 8px;border-radius:8px;font-weight:700">+ رأس المال</button>`;
  return `<div class="fade" style="display:flex;flex-direction:column;gap:14px">
    <div class="card" style="padding:18px;background:radial-gradient(120% 90% at 80% 0%,rgba(143,203,58,.07),var(--surface))">
      <div style="display:flex;align-items:center;justify-content:space-between"><span style="color:var(--muted);font-size:13px">إجمالي قيمة الحساب</span>${capBtn}</div>
      <div id="homeVal" class="num" style="color:var(--text);font-size:40px;font-weight:800;letter-spacing:-1px;margin-top:4px">${sym()}${nf(A.value)}</div>
      <div id="homeDelta" class="num" style="margin-top:6px;color:${ch>0?TR_GREEN:ch<0?RH_DN:C.muted};font-size:14px;font-weight:700">${deltaTxt}</div>
    </div>
    <div style="display:flex;gap:10px">
      ${[['اليوم',A.today],['الأسبوع',A.week],['الشهر',A.month],['السنة',A.year]].map(([l,v])=>`<div class="card" style="padding:10px 8px;flex:1;display:flex;flex-direction:column;gap:4px;text-align:center"><span style="color:var(--muted);font-size:11px">${l}</span><span class="num" style="color:${pc(v)};font-size:13px;font-weight:700">${sg(v)}</span></div>`).join('')}
    </div>
    <div class="card" style="padding:14px 14px 6px">
      <div style="margin-inline:-6px">${lineChartHTML(series,tfLabel)}</div>
      <div style="display:flex;justify-content:space-between;align-items:center;margin-top:10px;padding:0 4px">
        ${TF.map(([v,t])=>`<button onclick="setTf(${v})" style="background:${state.tf===v?'var(--surface2)':'transparent'};border:none;color:${state.tf===v?'var(--text)':'var(--muted)'};font-weight:${state.tf===v?'800':'500'};font-size:12.5px;padding:7px 12px;border-radius:99px;cursor:pointer">${t}</button>`).join('')}
      </div>
    </div>
    <div class="card" style="padding:14px"><span style="color:var(--muted);font-size:12px">الربح اليومي</span><div style="margin-top:8px;margin-inline:-6px">${svgBars(bars)}</div></div>
    ${!A.count?`<div class="card" style="padding:20px;text-align:center;color:var(--muted);font-size:14px">ابدأ: اضغط <b style="color:var(--orange)">استيراد صفقة</b> وأعطِ صورة الشراء وصورة البيع، أو أضِف صفقة يدوياً من زر <b style="color:var(--orange)">+</b>.</div>`:''}
  </div>`;
}
function viewCal(){
  const A=analytics();const{y,m}=state.cursor;
  const first=new Date(y,m,1),offset=(first.getDay()+6)%7,days=new Date(y,m+1,0).getDate();
  const cells=[];for(let i=0;i<offset;i++)cells.push(null);for(let d=1;d<=days;d++)cells.push(`${y}-${pad2(m+1)}-${pad2(d)}`);
  const maxAbs=Math.max(1,...cells.filter(Boolean).map(d=>Math.abs(A.dailyMap[d]||0)));
  const monthPnl=cells.filter(Boolean).reduce((t,d)=>t+(A.dailyMap[d]||0),0);
  return `<div class="fade card" style="padding:14px">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px">
      <button class="ibtn" onclick="shiftMonth(-1)">‹</button>
      <div style="text-align:center"><div style="font-weight:700;font-size:15px">${AR_MONTHS[m]} ${y}</div><div class="num" style="color:${pc(monthPnl)};font-size:12px;font-weight:600">${sg(monthPnl)}</div></div>
      <button class="ibtn" onclick="shiftMonth(1)">›</button></div>
    <div class="grid7" style="margin-bottom:6px">${AR_DOW.map(d=>`<div style="text-align:center;color:var(--muted);font-size:10px">${d}</div>`).join('')}</div>
    <div class="grid7">${cells.map(d=>{if(!d)return '<div></div>';const p=A.dailyMap[d],has=p!==undefined,isT=d===todayStr();const a=has?Math.min(.85,.18+Math.abs(p)/maxAbs*.6):0;const bg=has?(p>0?`rgba(34,211,154,${a})`:p<0?`rgba(255,77,109,${a})`:'var(--surface2)'):'var(--bg)';return `<button class="day" onclick="openDay('${d}')" style="background:${bg};${isT?'border-color:var(--orange)':''}"><span class="num" style="${has?'font-weight:700':'opacity:.55'}">${parseD(d).getDate()}</span>${has?`<span class="num" style="font-size:8.5px;opacity:.9">${p>=0?'+':''}${nf(p,0)}</span>`:''}</button>`}).join('')}</div></div>`;
}
function viewTrades(){
  const A=analytics();
  if(!A.t.length)return `<div class="fade card" style="padding:22px;text-align:center;color:var(--muted)">لا توجد صفقات بعد.</div>`;
  const list=[...A.t].sort((a,b)=>(b.sellDate||'').localeCompare(a.sellDate||''));
  return `<div class="fade" style="display:flex;flex-direction:column;gap:10px">${list.map(x=>{const pct=x.cost?x.profit/x.cost*100:0;return `
    <div class="card" style="padding:14px"><div style="display:flex;justify-content:space-between;align-items:flex-start">
      <div><div style="font-weight:700;font-size:15px">${esc(x.coin)}</div>
        <div class="num" style="color:var(--muted);font-size:11px;margin-top:4px">${esc(x.buyDate||'—')} ← ${esc(x.sellDate||'—')}</div>
        <div class="num" style="color:var(--muted);font-size:11px;margin-top:2px">${sym()}${nf(x.cost)} ← ${sym()}${nf(x.proceeds)}${x.fee?` · رسوم ${nf(x.fee)}`:''}</div></div>
      <div style="text-align:left;display:flex;flex-direction:column;align-items:flex-end;gap:8px">
        <div class="num" style="color:${pc(x.profit)};font-size:16px;font-weight:800">${x.profit>=0?'+':'−'}${sym()}${nf(Math.abs(x.profit))}</div>
        <div class="num" style="color:${pc(x.profit)};font-size:12px">${pct>=0?'+':'−'}${nf(Math.abs(pct))}%</div>
        <div style="display:flex;gap:6px"><button class="ibtn" onclick="openTrade('${x.id}')">تعديل</button><button class="ibtn" style="color:var(--red)" onclick="delTrade('${x.id}')">🗑</button></div>
      </div></div></div>`}).join('')}</div>`;
}
function viewSet(){return `<div class="fade" style="display:flex;flex-direction:column;gap:14px">
  <div class="card" style="padding:16px;display:flex;flex-direction:column;gap:12px">
    <label class="lab"><span class="labt">رأس المال / الرصيد الأساسي (${esc(sym())})</span><input class="num" type="number" inputmode="decimal" step="any" value="${esc(state.settings.capital||'')}" placeholder="1000" oninput="state.settings.capital=num(this.value);save()"></label>
    <label class="lab"><span class="labt">رمز العملة</span><input maxlength="4" value="${esc(sym())}" style="width:110px" oninput="state.settings.sym=this.value;save()"></label></div>
  <div class="card" style="padding:16px;display:flex;flex-direction:column;gap:12px"><span style="font-weight:700;font-size:14px">النسخ الاحتياطي</span><span style="color:var(--muted);font-size:12px">كل البيانات محفوظة على جهازك فقط.</span>
    <div style="display:flex;gap:10px"><button class="ibtn" style="flex:1;height:auto;padding:12px" onclick="exportData()">⬇ تصدير</button><button class="ibtn" style="flex:1;height:auto;padding:12px;color:var(--orange)" onclick="importData()">⬆ استيراد</button></div>
    <textarea id="ioBox" placeholder="الصق نسخة احتياطية هنا…" style="min-height:70px;font-family:monospace;font-size:12px;direction:ltr"></textarea></div>
  <div class="card" style="padding:16px"><button onclick="clearData()" style="width:100%;background:none;border:1px solid var(--red);color:var(--red);border-radius:12px;padding:12px;font-weight:700;cursor:pointer">مسح كل الصفقات</button></div></div>`}

/* modal */
function showModal(html){document.getElementById('modal').innerHTML=`<div class="overlay" onclick="if(event.target===this)closeModal()"><div class="sheetbox sheet">${html}</div></div>`}
function closeModal(){document.getElementById('modal').innerHTML='';importState={};editId=null}
const head=t=>`<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:18px"><h2>${t}</h2><button class="ibtn" onclick="closeModal()">✕</button></div>`;
function setTab(t){state.tab=t;state.menu=false;render()}
function setTf(v){state.tf=v;render()}
function toggleMenu(){state.menu=!state.menu;render()}
function closeMenu(){state.menu=false;render()}
function shiftMonth(d){const x=new Date(state.cursor.y,state.cursor.m+d,1);state.cursor={y:x.getFullYear(),m:x.getMonth()};render()}

/* manual trade */
function openTrade(id){
  let tr={coin:'',buyDate:todayStr(),sellDate:todayStr(),cost:'',proceeds:'',fee:''};
  if(id){const f=state.trades.find(x=>String(x.id)===String(id));if(f){tr={...f};editId=id}}
  showModal(head(id?'تعديل صفقة':'صفقة يدوية')+`<div style="display:flex;flex-direction:column;gap:14px">
    <label class="lab"><span class="labt">العملة</span><input id="mCoin" list="coinDL" autocapitalize="characters" value="${esc(tr.coin)}" placeholder="BTC"></label>
    <div style="display:flex;gap:12px"><label class="lab"><span class="labt">تاريخ الشراء</span><input id="mBuyDate" type="date" value="${esc(tr.buyDate)}"></label><label class="lab"><span class="labt">تاريخ البيع</span><input id="mSellDate" type="date" value="${esc(tr.sellDate)}"></label></div>
    <div style="display:flex;gap:12px"><label class="lab"><span class="labt">مبلغ الشراء (${esc(sym())})</span><input id="mCost" class="num" type="number" inputmode="decimal" step="any" value="${esc(tr.cost)}" placeholder="3520.40" oninput="updMP()"></label><label class="lab"><span class="labt">مبلغ البيع (${esc(sym())})</span><input id="mProceeds" class="num" type="number" inputmode="decimal" step="any" value="${esc(tr.proceeds)}" placeholder="3611.63" oninput="updMP()"></label></div>
    <label class="lab"><span class="labt">الرسوم (${esc(sym())}) — اختياري</span><input id="mFee" class="num" type="number" inputmode="decimal" step="any" value="${esc(tr.fee)}" placeholder="0" oninput="updMP()"></label>
    <div class="card" style="background:var(--bg);padding:14px;display:flex;justify-content:space-between;align-items:center"><span style="color:var(--muted);font-size:12px">الربح</span><span id="mProfit" class="num" style="font-size:18px;font-weight:800">${sym()}0.00</span></div>
    <button class="primary" onclick="saveTradeManual()">${id?'حفظ التعديل':'حفظ الصفقة'}</button></div>`);
  updMP();
}
function updMP(){const p=num(val('mProceeds'))-num(val('mCost'))-num(val('mFee'));const pct=num(val('mCost'))?p/num(val('mCost'))*100:0;const e=document.getElementById('mProfit');if(e){e.textContent=(p>=0?'+':'−')+sym()+nf(Math.abs(p))+' ('+(p>=0?'+':'−')+nf(Math.abs(pct))+'%)';e.style.color=p>0?RH_UP:p<0?RH_DN:C.muted}}
function saveTradeManual(){
  const coin=val('mCoin').trim().toUpperCase(),cost=num(val('mCost')),proceeds=num(val('mProceeds'));
  if(!coin||!(cost>0)||!(proceeds>0))return alert('أدخل العملة ومبلغ الشراء ومبلغ البيع.');
  const o={coin,buyDate:val('mBuyDate'),sellDate:val('mSellDate'),cost,proceeds,fee:num(val('mFee'))};
  if(editId)state.trades=state.trades.map(x=>String(x.id)===String(editId)?{...o,id:x.id}:x);else state.trades.push({...o,id:Date.now()});
  save();closeModal();render();
}
function delTrade(id){if(confirm('حذف الصفقة؟')){state.trades=state.trades.filter(x=>String(x.id)!==String(id));save();render()}}
function openCapital(){showModal(head('رأس المال / الرصيد الأساسي')+`<div style="display:flex;flex-direction:column;gap:14px">
  <div style="color:var(--muted);font-size:12.5px;line-height:1.6">المبلغ الذي بدأت به (إيداعك الأساسي). قيمة الحساب = رأس المال + الأرباح المحقّقة.</div>
  <label class="lab"><span class="labt">رأس المال (${esc(sym())})</span><input id="capIn" class="num" type="number" inputmode="decimal" step="any" value="${esc(state.settings.capital||'')}" placeholder="1000"></label>
  <button class="primary" onclick="saveCapital()">حفظ</button></div>`)}
function saveCapital(){state.settings.capital=num(val('capIn'));save();closeModal();render()}

function openDay(d){
  const A=analytics();const tr=A.t.filter(x=>(x.sellDate||x.buyDate)===d);const p=A.dailyMap[d];
  showModal(head(`<span class="num">${d}</span>`)+(p!==undefined?`<div class="num" style="color:${pc(p)};font-size:13px;margin-top:-8px;margin-bottom:12px">ربح اليوم ${sg(p)}</div>`:'')+(!tr.length?`<div style="color:var(--muted);font-size:13px">لا توجد صفقات مغلقة في هذا اليوم.</div>`:'')+`<div style="display:flex;flex-direction:column;gap:8px">${tr.map(x=>`<div class="row"><span style="font-weight:600">${esc(x.coin)}</span><span class="num" style="color:${pc(x.profit)}">${x.profit>=0?'+':'−'}${sym()}${nf(Math.abs(x.profit))}</span></div>`).join('')}</div>`);
}

/* OCR helpers */
function loadTesseract(){return new Promise((res,rej)=>{if(window.Tesseract)return res();const s=document.createElement('script');s.src='https://cdnjs.cloudflare.com/ajax/libs/tesseract.js/5.1.0/tesseract.min.js';s.onload=()=>res();s.onerror=()=>rej(new Error('load'));document.head.appendChild(s)})}
function pickDate(text){const dt=text.match(/(\d{4}-\d{2}-\d{2})\s+\d{1,2}:\d{2}/);if(dt)return dt[1];const all=text.match(/\d{4}-\d{2}-\d{2}/g);if(all&&all.length)return all[all.length-1];return ''}
function parseOrder(text){
  const o={};
  const pair=text.match(/([A-Z]{2,6})\s*\/\s*[A-Z]{2,6}/i);if(pair)o.coin=pair[1].toUpperCase();
  o.side=/\bsell\b/i.test(text)?'sell':/\bbuy\b/i.test(text)?'buy':'';
  o.date=pickDate(text);
  const fv=text.match(/filled\s*value[^0-9]*([0-9][0-9,]*\.?[0-9]*)/i);if(fv)o.value=num(fv[1]);
  if(!o.value){const od=text.match(/filled\s*amount[^0-9]*([0-9][0-9,]*\.?[0-9]*)/i);if(od)o.value=num(od[1])}
  const fq=text.match(/filled\s*quantity[^0-9]*([0-9][0-9,]*\.?[0-9]*)/i);if(fq)o.qty=num(fq[1]);
  const ap=text.match(/avg\.?\s*filled\s*price[^0-9]*([0-9][0-9,]*\.?[0-9]*)/i);if(ap)o.price=num(ap[1]);
  return o;
}

/* trade import (two screenshots) */
function openTradeImg(){importState={mode:'trade',target:'buy',buy:null,sell:null,busy:'',err:'',draft:null,ok:''};renderTradeImg()}
function pickSlot(which){importState.mode='trade';importState.target=which;document.getElementById('file').click()}
function onFile(e){const f=e.target.files&&e.target.files[0];if(!f)return;const r=new FileReader();r.onload=()=>{importState[importState.target]={url:r.result,data:null};importState.draft=null;importState.err='';importState.ok='';renderTradeImg()};r.readAsDataURL(f);e.target.value=''}
async function readSlot(which){
  importState.busy=which;importState.err='';renderTradeImg();
  try{await loadTesseract();const w=await Tesseract.createWorker('eng');const{data:{text}}=await w.recognize(importState[which].url);await w.terminate();importState[which].data=parseOrder(text);importState.draft=null;}
  catch(e){importState.err='تعذّرت القراءة. تأكد إنك فاتح التطبيق من رابط GitHub Pages (مش معاينة Claude)، أو عدّل القيم يدوياً تحت.';importState[which].data={}}
  importState.busy='';renderTradeImg();
}
function slotHTML(which,label,color){
  const sl=importState[which];
  if(!sl||!sl.url)return `<button class="pick" style="padding:16px" onclick="pickSlot('${which}')"><span style="font-size:22px">📷</span><span style="color:${color};font-weight:700">${label}</span><span style="font-size:11px">اختر لقطة الشاشة</span></button>`;
  if(!sl.data)return `<div class="card" style="padding:10px"><img src="${sl.url}" style="width:100%;max-height:110px;object-fit:contain;border-radius:8px;background:#000"><div style="display:flex;gap:8px;margin-top:8px"><button class="ibtn" onclick="pickSlot('${which}')">تغيير</button><button class="primary" style="flex:1" ${importState.busy===which?'disabled':''} onclick="readSlot('${which}')">${importState.busy===which?'<span class="spin">◠</span> قراءة…':'✨ اقرأ '+label}</button></div></div>`;
  return `<div class="card" style="padding:12px;display:flex;justify-content:space-between;align-items:center"><div><div style="font-weight:700;font-size:13px;color:${color}">${label} ✓</div><div class="num" style="color:var(--muted);font-size:11px">${esc(sl.data.date||'—')} · ${sym()}${nf(sl.data.value||0)}</div></div><button class="ibtn" onclick="pickSlot('${which}')">تغيير</button></div>`;
}
function buildDraft(){
  if(!importState.draft){const b=(importState.buy&&importState.buy.data)||{},s=(importState.sell&&importState.sell.data)||{};
    importState.draft={coin:s.coin||b.coin||'',buyDate:b.date||'',sellDate:s.date||'',cost:b.value||'',proceeds:s.value||'',fee:''}}
  return importState.draft;
}
function renderTradeImg(){
  const i=importState;
  const both=i.buy&&i.buy.data&&i.sell&&i.sell.data;
  let review='';
  if(both){const d=buildDraft();
    review=`<div style="margin-top:14px;border-top:1px solid var(--border);padding-top:14px;display:flex;flex-direction:column;gap:12px">
      <span style="font-weight:700;font-size:14px">راجع وعدّل</span>
      <label class="lab"><span class="labt">العملة</span><input list="coinDL" value="${esc(d.coin)}" oninput="importState.draft.coin=this.value"></label>
      <div style="display:flex;gap:12px"><label class="lab"><span class="labt">تاريخ الشراء</span><input type="date" value="${esc(d.buyDate)}" oninput="importState.draft.buyDate=this.value"></label><label class="lab"><span class="labt">تاريخ البيع</span><input type="date" value="${esc(d.sellDate)}" oninput="importState.draft.sellDate=this.value"></label></div>
      <div style="display:flex;gap:12px"><label class="lab"><span class="labt">مبلغ الشراء</span><input class="num" type="number" step="any" value="${esc(d.cost)}" oninput="importState.draft.cost=this.value;updTP()"></label><label class="lab"><span class="labt">مبلغ البيع</span><input class="num" type="number" step="any" value="${esc(d.proceeds)}" oninput="importState.draft.proceeds=this.value;updTP()"></label></div>
      <label class="lab"><span class="labt">الرسوم — اختياري</span><input class="num" type="number" step="any" value="${esc(d.fee)}" oninput="importState.draft.fee=this.value;updTP()"></label>
      <div class="card" style="background:var(--bg);padding:14px;display:flex;justify-content:space-between;align-items:center"><span style="color:var(--muted);font-size:12px">الربح المحسوب</span><span id="tradeProfit" class="num" style="font-size:18px;font-weight:800"></span></div>
      <button class="primary" onclick="saveDraft()">حفظ الصفقة</button></div>`;
  }
  const ok=i.ok?`<div style="color:${RH_UP};font-size:12.5px;margin-bottom:12px;background:rgba(31,209,107,.08);border:1px solid var(--border);border-radius:12px;padding:10px 12px">${esc(i.ok)}</div>`:'';
  const note=i.err?`<div style="color:var(--orange);font-size:12.5px;margin:12px 0;line-height:1.7;background:rgba(255,122,26,.08);border:1px solid var(--border);border-radius:12px;padding:10px 12px">${esc(i.err)}</div>`:'';
  showModal(head('✨ صفقة من صورتين')+`<div style="color:var(--muted);font-size:12px;margin-bottom:14px">صوّر أمر الشراء وأمر البيع، والتطبيق يحسب التاريخ والمبلغ والربح تلقائياً.</div>
    ${ok}<div style="display:flex;flex-direction:column;gap:10px">${slotHTML('buy','أمر الشراء',RH_UP)}${slotHTML('sell','أمر البيع',RH_DN)}</div>${note}${review}`);
  updTP();
}
function updTP(){const d=importState.draft;if(!d)return;const p=num(d.proceeds)-num(d.cost)-num(d.fee);const pct=num(d.cost)?p/num(d.cost)*100:0;const e=document.getElementById('tradeProfit');if(e){e.textContent=(p>=0?'+':'−')+sym()+nf(Math.abs(p))+' ('+(p>=0?'+':'−')+nf(Math.abs(pct))+'%)';e.style.color=p>0?RH_UP:p<0?RH_DN:C.muted}}
function saveDraft(){
  const d=importState.draft;if(!d||!d.coin||!(num(d.cost)>0)||!(num(d.proceeds)>0))return alert('تأكد من العملة ومبلغ الشراء والبيع.');
  state.trades.push({id:Date.now(),coin:d.coin.toUpperCase(),buyDate:d.buyDate||todayStr(),sellDate:d.sellDate||d.buyDate||todayStr(),cost:num(d.cost),proceeds:num(d.proceeds),fee:num(d.fee)});
  save();render();
  importState={mode:'trade',target:'buy',buy:null,sell:null,busy:'',err:'',draft:null,ok:'تم حفظ الصفقة ✓ — إجمالي الصفقات: '+state.trades.length};
  renderTradeImg();
}

/* backup */
function exportData(){const d=JSON.stringify({trades:state.trades,settings:state.settings});if(navigator.clipboard)navigator.clipboard.writeText(d).then(()=>alert('تم النسخ.')).catch(()=>{document.getElementById('ioBox').value=d});else document.getElementById('ioBox').value=d}
function importData(){try{const o=JSON.parse(val('ioBox'));if(o.trades)state.trades=o.trades;if(o.settings)Object.assign(state.settings,o.settings);save();render();alert('تم الاستيراد.')}catch(e){alert('صيغة غير صحيحة.')}}
function clearData(){if(confirm('مسح كل الصفقات نهائياً؟')){state.trades=[];save();render()}}

render();
</script>
