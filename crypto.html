<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>Bod Terminal — Crypto Charts</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/lightweight-charts/4.1.3/lightweight-charts.standalone.production.min.js"></script>
<style>
  :root{
    --bg:#0b0f1a; --panel:#121829; --panel2:#0e1424; --line:#1e2740;
    --txt:#dbe2f4; --dim:#6b7694; --up:#22ab94; --dn:#f23645;
    --accent:#4f8cff; --gold:#e8b45a; --chipbg:#171f36;
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  html,body{height:100%}
  body{background:var(--bg);color:var(--txt);font-family:ui-monospace,'SF Mono',SFMono-Regular,Menlo,Consolas,monospace;overflow:hidden;display:flex;flex-direction:column}

  /* ---------- top bar ---------- */
  #topbar{display:flex;align-items:center;gap:8px;padding:8px 10px;background:var(--panel);border-bottom:1px solid var(--line);flex-wrap:wrap}
  #symWrap{position:relative;display:flex;align-items:center;gap:6px}
  #symInput{background:var(--panel2);border:1px solid var(--line);color:var(--txt);font:inherit;font-size:15px;font-weight:700;letter-spacing:.5px;padding:7px 10px;border-radius:8px;width:150px;text-transform:uppercase;outline:none}
  #symInput:focus{border-color:var(--accent)}
  #priceBox{display:flex;flex-direction:column;line-height:1.15;min-width:110px}
  #lastPrice{font-size:17px;font-weight:800}
  #chg{font-size:11px}
  .up{color:var(--up)} .dn{color:var(--dn)}
  #status{margin-left:auto;font-size:10px;color:var(--dim);display:flex;align-items:center;gap:5px}
  #dot{width:7px;height:7px;border-radius:50%;background:var(--dim)}
  #dot.live{background:var(--up);box-shadow:0 0 6px var(--up)}
  #dot.err{background:var(--dn)}

  /* ---------- rows of chips ---------- */
  .row{display:flex;gap:5px;padding:6px 10px;background:var(--panel);border-bottom:1px solid var(--line);overflow-x:auto;scrollbar-width:none;align-items:center}
  .row::-webkit-scrollbar{display:none}
  .rowlabel{font-size:9px;color:var(--dim);letter-spacing:1px;flex:0 0 auto;margin-right:2px}
  .chip{flex:0 0 auto;background:var(--chipbg);border:1px solid var(--line);color:var(--dim);font:inherit;font-size:11px;font-weight:600;padding:5px 10px;border-radius:7px;cursor:pointer;transition:all .12s}
  .chip:hover{color:var(--txt)}
  .chip.on{background:var(--accent);border-color:var(--accent);color:#fff}
  .chip.ind.on{background:transparent;border-color:var(--c,var(--accent));color:var(--c,var(--accent))}
  .chip:focus-visible{outline:2px solid var(--accent);outline-offset:1px}

  /* ---------- charts ---------- */
  #charts{flex:1;display:flex;flex-direction:column;min-height:0;position:relative}
  .pane{position:relative;border-bottom:1px solid var(--line)}
  #mainPane{flex:1;min-height:0}
  .sub{flex:0 0 var(--h,140px)}
  .legend{position:absolute;top:6px;left:8px;z-index:5;font-size:10px;line-height:1.5;pointer-events:none;text-shadow:0 1px 3px #000}
  .legend b{font-weight:700}
  .paneTitle{position:absolute;top:6px;left:8px;z-index:5;font-size:10px;color:var(--dim);letter-spacing:1px;pointer-events:none}
  .paneVals{position:absolute;top:6px;left:70px;z-index:5;font-size:10px;pointer-events:none;text-shadow:0 1px 3px #000}
  .closeSub{position:absolute;top:4px;right:64px;z-index:6;background:var(--chipbg);border:1px solid var(--line);color:var(--dim);font:inherit;font-size:10px;border-radius:5px;padding:1px 6px;cursor:pointer}

  #overlayMsg{position:absolute;inset:0;display:none;align-items:center;justify-content:center;z-index:20;background:rgba(11,15,26,.85);text-align:center;padding:24px;font-size:13px;line-height:1.7;color:var(--dim)}

  @media (max-width:520px){
    #symInput{width:118px;font-size:14px}
    #lastPrice{font-size:15px}
  }
</style>
</head>
<body>

<div id="topbar">
  <div id="symWrap">
    <input id="symInput" value="BTCUSDT" spellcheck="false" autocomplete="off" enterkeyhint="go" aria-label="Symbol">
  </div>
  <div id="priceBox">
    <span id="lastPrice">—</span>
    <span id="chg">—</span>
  </div>
  <div id="status"><span id="dot"></span><span id="statusTxt">connecting</span></div>
</div>

<div class="row" id="quickRow">
  <span class="rowlabel">PAIRS</span>
</div>

<div class="row" id="tfRow">
  <span class="rowlabel">TF</span>
</div>

<div class="row" id="indRow">
  <span class="rowlabel">IND</span>
</div>

<div id="charts">
  <div class="pane" id="mainPane">
    <div class="legend" id="mainLegend"></div>
  </div>
  <div id="overlayMsg"></div>
</div>

<script>
'use strict';
/* ================= config ================= */
const QUICK = ['BTCUSDT','ETHUSDT','SOLUSDT','INJUSDT','HYPEUSDT','MONUSDT','AKTUSDT','BNBUSDT','XRPUSDT'];
const TFS = [['1m','1m'],['5m','5m'],['15m','15m'],['30m','30m'],['1h','1h'],['4h','4h'],['1d','1D'],['1w','1W']];
const COLORS = {sma20:'#2bd94f', sma50:'#4f8cff', sma200:'#ffffff', ema:'#e8b45a', bbU:'#8a6bd1', bbL:'#8a6bd1', bbM:'#8a6bd166', vwap:'#ff8bd1'};

const OVERLAYS = [
  {id:'sma20',  label:'SMA 20',  c:COLORS.sma20, on:true},
  {id:'sma50',  label:'SMA 50',  c:COLORS.sma50, on:true},
  {id:'sma200', label:'SMA 200', c:COLORS.sma200,on:true},
  {id:'ema20',  label:'EMA 20',  c:COLORS.ema,   on:false},
  {id:'bb',     label:'BB 20·2', c:'#8a6bd1',    on:false},
  {id:'vwap',   label:'VWAP',    c:COLORS.vwap,  on:false},
  {id:'vol',    label:'VOL',     c:'#7f8cae',    on:true},
];
const OSCS = [
  {id:'smi',      label:'SMI',       c:'#4f8cff', on:true},
  {id:'stochrsi', label:'STOCH RSI', c:'#e8b45a', on:false},
  {id:'rsi',      label:'RSI 14',    c:'#b48cff', on:false},
  {id:'macd',     label:'MACD',      c:'#2bd94f', on:false},
];

/* ================= state ================= */
let symbol='BTCUSDT', tf='15m';
let candles=[];            // {time,open,high,low,close,volume}
let mainChart=null, candleSeries=null, volSeries=null;
let overlaySeries={};      // id -> series or {u,m,l}
let subPanes={};           // id -> {el,chart,series:{...},valsEl}
let pollTimer=null, syncing=false, fmt=null;

const $=q=>document.querySelector(q);
const chartsEl=$('#charts'), mainEl=$('#mainPane');

/* ================= indicator math ================= */
const sma=(src,len)=>src.map((_,i)=>{ if(i<len-1)return null; let s=0; for(let j=i-len+1;j<=i;j++)s+=src[j]; return s/len; });
function ema(src,len){ const out=new Array(src.length).fill(null); const k=2/(len+1); let prev=null,started=false,seed=0,cnt=0;
  for(let i=0;i<src.length;i++){ const v=src[i]; if(v==null){out[i]=prev;continue;}
    if(!started){ seed+=v; cnt++; if(cnt===len){ prev=seed/len; out[i]=prev; started=true; } continue; }
    prev=v*k+prev*(1-k); out[i]=prev; } return out; }
function emaRaw(src,len){ // ema over arrays that may contain nulls at head
  const firstIdx=src.findIndex(v=>v!=null); if(firstIdx<0)return src.map(_=>null);
  const tail=ema(src.slice(firstIdx),len); return new Array(firstIdx).fill(null).concat(tail); }
function rsiArr(close,len=14){ const out=new Array(close.length).fill(null); let g=0,l=0;
  for(let i=1;i<close.length;i++){ const d=close[i]-close[i-1]; const up=Math.max(d,0), dn=Math.max(-d,0);
    if(i<=len){ g+=up; l+=dn; if(i===len){ g/=len; l/=len; out[i]=100-100/(1+(l===0?100:g/l)); } }
    else { g=(g*(len-1)+up)/len; l=(l*(len-1)+dn)/len; out[i]=l===0?100:100-100/(1+g/l); } } return out; }
function hhll(arrH,arrL,len,i){ let hh=-Infinity,ll=Infinity; for(let j=Math.max(0,i-len+1);j<=i;j++){ if(arrH[j]>hh)hh=arrH[j]; if(arrL[j]<ll)ll=arrL[j]; } return [hh,ll]; }
function smiArr(c,len=10,s1=3,s2=3,sig=3){
  const d=[],r=[]; const H=c.map(x=>x.high), L=c.map(x=>x.low);
  for(let i=0;i<c.length;i++){ if(i<len-1){d.push(null);r.push(null);continue;}
    const [hh,ll]=hhll(H,L,len,i);
    d.push(c[i].close-(hh+ll)/2); r.push(hh-ll); }
  const ds=emaRaw(emaRaw(d,s1),s2), rs=emaRaw(emaRaw(r,s1),s2);
  const smi=ds.map((v,i)=> (v==null||rs[i]==null||rs[i]===0)?null:100*v/(rs[i]/2));
  return {smi, sig:emaRaw(smi,sig)};
}
function stochRsiArr(close,rsiLen=14,stochLen=14,k=3,dl=3){
  const r=rsiArr(close,rsiLen); const st=new Array(r.length).fill(null);
  for(let i=0;i<r.length;i++){ if(r[i]==null)continue; let hi=-Infinity,lo=Infinity,ok=true;
    for(let j=i-stochLen+1;j<=i;j++){ if(j<0||r[j]==null){ok=false;break;} if(r[j]>hi)hi=r[j]; if(r[j]<lo)lo=r[j]; }
    if(ok) st[i]= hi===lo?0:100*(r[i]-lo)/(hi-lo); }
  const smaN=(a,n)=>a.map((_,i)=>{ let s=0,c2=0; for(let j=i-n+1;j<=i;j++){ if(j<0||a[j]==null)return null; s+=a[j]; c2++; } return s/c2; });
  const K=smaN(st,k); return {k:K, d:smaN(K,dl)};
}
function macdArr(close,f=12,s=26,sg=9){ const ef=ema(close,f), es=ema(close,s);
  const m=ef.map((v,i)=> (v==null||es[i]==null)?null:v-es[i]);
  const sig=emaRaw(m,sg); const h=m.map((v,i)=>(v==null||sig[i]==null)?null:v-sig[i]); return {m,sig,h}; }
function bbArr(close,len=20,mult=2){ const mid=sma(close,len);
  const u=[],l=[]; for(let i=0;i<close.length;i++){ if(mid[i]==null){u.push(null);l.push(null);continue;}
    let s=0; for(let j=i-len+1;j<=i;j++)s+=(close[j]-mid[i])**2; const sd=Math.sqrt(s/len);
    u.push(mid[i]+mult*sd); l.push(mid[i]-mult*sd); } return {u,m:mid,l}; }
function vwapArr(c){ // resets daily
  const out=[]; let cum=0,cumV=0,day=null;
  for(const b of c){ const d=new Date(b.time*1000).getUTCDate(); if(d!==day){day=d;cum=0;cumV=0;}
    const tp=(b.high+b.low+b.close)/3; cum+=tp*b.volume; cumV+=b.volume; out.push(cumV?cum/cumV:null); } return out; }

const toLine=(vals)=>candles.map((b,i)=>({time:b.time,value:vals[i]})).filter(p=>p.value!=null&&isFinite(p.value));

/* ================= chart plumbing ================= */
const baseOpts=(el)=>({
  width:el.clientWidth, height:el.clientHeight,
  layout:{background:{color:'transparent'},textColor:'#8b96b5',fontSize:10,fontFamily:'ui-monospace,Menlo,monospace'},
  grid:{vertLines:{color:'#161d31'},horzLines:{color:'#161d31'}},
  crosshair:{mode:LightweightCharts.CrosshairMode.Normal},
  rightPriceScale:{borderColor:'#1e2740'},
  timeScale:{borderColor:'#1e2740',timeVisible:true,secondsVisible:false},
});

function allCharts(){ return [mainChart,...Object.values(subPanes).map(p=>p.chart)].filter(Boolean); }
function hookSync(chart){
  chart.timeScale().subscribeVisibleLogicalRangeChange(r=>{
    if(syncing||!r)return; syncing=true;
    allCharts().forEach(c=>{ if(c!==chart) c.timeScale().setVisibleLogicalRange(r); });
    syncing=false;
  });
}

function buildMain(){
  if(mainChart){mainChart.remove();}
  overlaySeries={}; volSeries=null;
  mainChart=LightweightCharts.createChart(mainEl,baseOpts(mainEl));
  candleSeries=mainChart.addCandlestickSeries({upColor:'#22ab94',downColor:'#f23645',wickUpColor:'#22ab94',wickDownColor:'#f23645',borderVisible:false});
  hookSync(mainChart);
  mainChart.subscribeCrosshairMove(param=>{
    const d=param&&param.seriesData?param.seriesData.get(candleSeries):null;
    renderMainLegend(d||lastBar());
  });
}

function lastBar(){ return candles.length?candles[candles.length-1]:null; }
function fnum(v){ if(v==null||!isFinite(v))return '—'; return fmt?fmt.format(v):v; }
function setFmt(){ const p=lastBar()?lastBar().close:1;
  const dp = p>=1000?2: p>=1?3: p>=0.01?5: 8;
  fmt=new Intl.NumberFormat('en-US',{minimumFractionDigits:Math.min(dp,2),maximumFractionDigits:dp}); }

function renderMainLegend(b){
  if(!b){$('#mainLegend').innerHTML='';return;}
  const up=b.close>=b.open;
  const parts=[`<b>${symbol}</b> · ${tf}`,
    `O <span class="${up?'up':'dn'}">${fnum(b.open)}</span> H <span class="${up?'up':'dn'}">${fnum(b.high)}</span> L <span class="${up?'up':'dn'}">${fnum(b.low)}</span> C <span class="${up?'up':'dn'}">${fnum(b.close)}</span>`];
  const idx=candles.findIndex(c=>c.time===b.time);
  const i = idx>=0?idx:candles.length-1;
  const lines=[];
  for(const o of OVERLAYS){ if(!o.on||o.id==='vol'||o.id==='bb')continue;
    const cache=indCache[o.id]; if(cache&&cache[i]!=null) lines.push(`<span style="color:${o.c}">${o.label} ${fnum(cache[i])}</span>`); }
  if(lines.length)parts.push(lines.join('  '));
  $('#mainLegend').innerHTML=parts.join('<br>');
}

/* ---------- sub panes ---------- */
function addSubPane(id,title,height){
  const el=document.createElement('div');
  el.className='pane sub'; el.style.setProperty('--h',height+'px');
  el.innerHTML=`<div class="paneTitle">${title}</div><div class="paneVals"></div><button class="closeSub" aria-label="Hide ${title}">×</button>`;
  chartsEl.appendChild(el);
  const chart=LightweightCharts.createChart(el,baseOpts(el));
  hookSync(chart);
  el.querySelector('.closeSub').onclick=()=>{ const o=OSCS.find(x=>x.id===id); o.on=false; renderIndChips(); rebuildSubs(); };
  const pane={el,chart,series:{},valsEl:el.querySelector('.paneVals')};
  subPanes[id]=pane; return pane;
}
function clearSubs(){ for(const k in subPanes){ subPanes[k].chart.remove(); subPanes[k].el.remove(); } subPanes={}; }

/* ================= data ================= */
async function loadData(showSpinner=true){
  if(showSpinner)setStatus('loading','');
  try{
    const res=await fetch(`https://api.binance.com/api/v3/klines?symbol=${symbol}&interval=${tf}&limit=500`);
    if(!res.ok){ const t=await res.json().catch(()=>({})); throw new Error(t.msg||('HTTP '+res.status)); }
    const raw=await res.json();
    candles=raw.map(k=>({time:Math.floor(k[0]/1000),open:+k[1],high:+k[2],low:+k[3],close:+k[4],volume:+k[5]}));
    setFmt();
    $('#overlayMsg').style.display='none';
    redrawAll(); updateHeader(); setStatus('live','live');
  }catch(e){
    setStatus('err','offline');
    $('#overlayMsg').style.display='flex';
    $('#overlayMsg').innerHTML=`⚠️ Couldn't load <b>&nbsp;${symbol}&nbsp;</b> from Binance.<br>${e.message||''}<br><br>Check the symbol (e.g. BTCUSDT, ETHUSDT) — or the network may be blocking api.binance.com in this environment.`;
  }
}
function setStatus(cls,txt){ const d=$('#dot'); d.className=''; if(cls==='live')d.classList.add('live'); if(cls==='err')d.classList.add('err'); $('#statusTxt').textContent=txt||cls; }

async function pollLast(){
  try{
    const res=await fetch(`https://api.binance.com/api/v3/klines?symbol=${symbol}&interval=${tf}&limit=2`);
    if(!res.ok)return;
    const raw=await res.json();
    for(const k of raw){
      const b={time:Math.floor(k[0]/1000),open:+k[1],high:+k[2],low:+k[3],close:+k[4],volume:+k[5]};
      const last=lastBar();
      if(last&&b.time===last.time)candles[candles.length-1]=b;
      else if(!last||b.time>last.time)candles.push(b);
    }
    redrawAll(false); updateHeader(); setStatus('live','live');
  }catch(_){}
}
function startPoll(){ clearInterval(pollTimer); pollTimer=setInterval(pollLast,4000); }

function updateHeader(){
  const b=lastBar(); if(!b)return;
  const first=candles[0];
  const chg=b.close-first.open, pct=100*chg/first.open;
  $('#lastPrice').textContent=fnum(b.close);
  $('#lastPrice').className=chg>=0?'up':'dn';
  $('#chg').textContent=`${chg>=0?'+':''}${fnum(chg)}  (${pct>=0?'+':''}${pct.toFixed(2)}%) · ${tf}`;
  $('#chg').className=chg>=0?'up':'dn';
  document.title=`${fnum(b.close)} ${symbol} — Bod Terminal`;
  renderMainLegend(b);
}

/* ================= drawing ================= */
let indCache={};
function computeOverlays(){
  const close=candles.map(c=>c.close);
  indCache={};
  if(OVERLAYS.find(o=>o.id==='sma20').on)indCache.sma20=sma(close,20);
  if(OVERLAYS.find(o=>o.id==='sma50').on)indCache.sma50=sma(close,50);
  if(OVERLAYS.find(o=>o.id==='sma200').on)indCache.sma200=sma(close,200);
  if(OVERLAYS.find(o=>o.id==='ema20').on)indCache.ema20=ema(close,20);
  if(OVERLAYS.find(o=>o.id==='vwap').on)indCache.vwap=vwapArr(candles);
}

function redrawAll(structure=true){
  if(!candles.length)return;
  if(!mainChart)buildMain();
  candleSeries.setData(candles);
  computeOverlays();

  if(structure){
    // wipe overlay series and rebuild per active toggles
    for(const k in overlaySeries){ const s=overlaySeries[k];
      (s.u? [s.u,s.m,s.l]:[s]).forEach(x=>{try{mainChart.removeSeries(x)}catch(_){}}); }
    overlaySeries={};
    if(volSeries){try{mainChart.removeSeries(volSeries)}catch(_){ } volSeries=null;}
    for(const o of OVERLAYS){
      if(!o.on)continue;
      if(o.id==='vol'){
        volSeries=mainChart.addHistogramSeries({priceScaleId:'vol',priceFormat:{type:'volume'},lastValueVisible:false,priceLineVisible:false});
        mainChart.priceScale('vol').applyOptions({scaleMargins:{top:0.82,bottom:0}});
      } else if(o.id==='bb'){
        const mk=(c2,w,st)=>mainChart.addLineSeries({color:c2,lineWidth:w,lineStyle:st,lastValueVisible:false,priceLineVisible:false,crosshairMarkerVisible:false});
        overlaySeries.bb={u:mk(COLORS.bbU,1,2),m:mk('#8a6bd188',1,0),l:mk(COLORS.bbL,1,2)};
      } else {
        const style = o.id==='sma50'?2:0; // dashed blue like the screenshot
        overlaySeries[o.id]=mainChart.addLineSeries({color:o.c,lineWidth:2,lineStyle:style,lastValueVisible:false,priceLineVisible:false,crosshairMarkerVisible:false});
      }
    }
  }

  // fill data into whatever series exist
  if(volSeries)volSeries.setData(candles.map(c=>({time:c.time,value:c.volume,color:c.close>=c.open?'#22ab9455':'#f2364555'})));
  if(overlaySeries.bb){ const bb=bbArr(candles.map(c=>c.close));
    overlaySeries.bb.u.setData(toLine(bb.u)); overlaySeries.bb.m.setData(toLine(bb.m)); overlaySeries.bb.l.setData(toLine(bb.l)); }
  for(const o of OVERLAYS){ if(o.on&&overlaySeries[o.id]&&indCache[o.id]) overlaySeries[o.id].setData(toLine(indCache[o.id])); }

  drawSubs(structure);
  renderMainLegend(lastBar());
}

function rebuildSubs(){ clearSubs(); drawSubs(true); }

function drawSubs(rebuild){
  const activeIds=OSCS.filter(o=>o.on).map(o=>o.id);
  // remove panes no longer active
  for(const id of Object.keys(subPanes)) if(!activeIds.includes(id)){ subPanes[id].chart.remove(); subPanes[id].el.remove(); delete subPanes[id]; }

  const close=candles.map(c=>c.close);
  for(const o of OSCS){
    if(!o.on)continue;
    let p=subPanes[o.id]||addSubPane(o.id,o.label,140);
    const S=p.series, mkLine=(c2,w)=>p.chart.addLineSeries({color:c2,lineWidth:w,lastValueVisible:false,priceLineVisible:false});

    if(o.id==='smi'){
      const {smi,sig}=smiArr(candles,10,3,3,3);
      if(!S.a){ S.a=mkLine('#4f8cff',2); S.b=mkLine('#ff9f43',2);
        S.a.createPriceLine({price:40,color:'#3a4566',lineStyle:2,lineWidth:1,axisLabelVisible:false});
        S.a.createPriceLine({price:-40,color:'#3a4566',lineStyle:2,lineWidth:1,axisLabelVisible:false});
        S.a.createPriceLine({price:0,color:'#26304d',lineStyle:2,lineWidth:1,axisLabelVisible:false}); }
      S.a.setData(toLine(smi)); S.b.setData(toLine(sig));
      p.vals=()=>{const i=candles.length-1;return `<span style="color:#4f8cff">K ${smi[i]!=null?smi[i].toFixed(1):'—'}</span> <span style="color:#ff9f43">D ${sig[i]!=null?sig[i].toFixed(1):'—'}</span>`;};
    }
    if(o.id==='stochrsi'){
      const {k,d}=stochRsiArr(close);
      if(!S.a){ S.a=mkLine('#e8b45a',2); S.b=mkLine('#4f8cff',2);
        S.a.createPriceLine({price:80,color:'#3a4566',lineStyle:2,lineWidth:1,axisLabelVisible:false});
        S.a.createPriceLine({price:20,color:'#3a4566',lineStyle:2,lineWidth:1,axisLabelVisible:false}); }
      S.a.setData(toLine(k)); S.b.setData(toLine(d));
      p.vals=()=>{const i=candles.length-1;return `<span style="color:#e8b45a">K ${k[i]!=null?k[i].toFixed(1):'—'}</span> <span style="color:#4f8cff">D ${d[i]!=null?d[i].toFixed(1):'—'}</span>`;};
    }
    if(o.id==='rsi'){
      const r=rsiArr(close,14);
      if(!S.a){ S.a=mkLine('#b48cff',2);
        S.a.createPriceLine({price:70,color:'#3a4566',lineStyle:2,lineWidth:1,axisLabelVisible:false});
        S.a.createPriceLine({price:30,color:'#3a4566',lineStyle:2,lineWidth:1,axisLabelVisible:false}); }
      S.a.setData(toLine(r));
      p.vals=()=>{const i=candles.length-1;return `<span style="color:#b48cff">${r[i]!=null?r[i].toFixed(1):'—'}</span>`;};
    }
    if(o.id==='macd'){
      const {m,sig,h}=macdArr(close);
      if(!S.h){ S.h=p.chart.addHistogramSeries({lastValueVisible:false,priceLineVisible:false});
        S.a=mkLine('#4f8cff',2); S.b=mkLine('#ff9f43',2); }
      S.h.setData(candles.map((b,i)=>({time:b.time,value:h[i]==null?0:h[i],color:(h[i]||0)>=0?'#22ab9466':'#f2364566'})));
      S.a.setData(toLine(m)); S.b.setData(toLine(sig));
      p.vals=()=>{const i=candles.length-1;return `<span style="color:#4f8cff">${m[i]!=null?m[i].toFixed(2):'—'}</span> <span style="color:#ff9f43">${sig[i]!=null?sig[i].toFixed(2):'—'}</span>`;};
    }
    if(p.vals)p.valsEl.innerHTML=p.vals();
  }
  resizeAll();
  // resync ranges
  if(mainChart){ const r=mainChart.timeScale().getVisibleLogicalRange(); if(r)allCharts().forEach(c=>c.timeScale().setVisibleLogicalRange(r)); }
}

function resizeAll(){
  if(mainChart)mainChart.applyOptions({width:mainEl.clientWidth,height:mainEl.clientHeight});
  for(const k in subPanes){ const p=subPanes[k]; p.chart.applyOptions({width:p.el.clientWidth,height:p.el.clientHeight}); }
}
window.addEventListener('resize',resizeAll);

/* ================= UI ================= */
function renderQuick(){
  const row=$('#quickRow');
  row.querySelectorAll('.chip').forEach(x=>x.remove());
  for(const s of QUICK){
    const b=document.createElement('button'); b.className='chip'+(s===symbol?' on':''); b.textContent=s.replace('USDT','');
    b.onclick=()=>{ symbol=s; $('#symInput').value=s; renderQuick(); loadData(); };
    row.appendChild(b);
  }
}
function renderTf(){
  const row=$('#tfRow'); row.querySelectorAll('.chip').forEach(x=>x.remove());
  for(const [v,l] of TFS){
    const b=document.createElement('button'); b.className='chip'+(v===tf?' on':''); b.textContent=l;
    b.onclick=()=>{ tf=v; renderTf(); loadData(); };
    row.appendChild(b);
  }
}
function renderIndChips(){
  const row=$('#indRow'); row.querySelectorAll('.chip').forEach(x=>x.remove());
  for(const o of [...OVERLAYS,...OSCS]){
    const b=document.createElement('button'); b.className='chip ind'+(o.on?' on':''); b.style.setProperty('--c',o.c); b.textContent=o.label;
    b.onclick=()=>{ o.on=!o.on; renderIndChips();
      if(OSCS.includes(o)){ drawSubs(true); } else { redrawAll(true); } };
    row.appendChild(b);
  }
}
$('#symInput').addEventListener('keydown',e=>{
  if(e.key==='Enter'){ let v=e.target.value.trim().toUpperCase();
    if(v&&!/USDT$|USDC$|BTC$|ETH$|FDUSD$|EUR$|TRY$/.test(v))v+='USDT';
    e.target.value=v; symbol=v; renderQuick(); loadData(); e.target.blur(); }
});

/* ================= boot ================= */
function boot(){
  if(typeof LightweightCharts==='undefined'){
    $('#overlayMsg').style.display='flex';
    $('#overlayMsg').textContent='Chart library failed to load from CDN.';
    return;
  }
  renderQuick(); renderTf(); renderIndChips();
  buildMain(); loadData(); startPoll();
}
boot();
</script>
</body>
</html>
